<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kosten – Flexfundament</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .cost-sum{font-size:1.1rem;font-weight:700;color:var(--color-primary);padding:8px 0;margin-bottom:8px}
    .autocomplete-list{position:absolute;left:0;right:0;background:#fff;border:1px solid var(--color-border);border-radius:var(--radius-sm);max-height:150px;overflow-y:auto;z-index:50}
    .autocomplete-item{padding:10px 12px;cursor:pointer;font-size:.9rem}
    .autocomplete-item:hover{background:var(--color-bg)}
    .upload-buttons{display:flex;gap:8px;flex-wrap:wrap}
    .upload-buttons .btn{font-size:.8rem;padding:8px 12px}
    .upload-buttons input[type="file"]{display:none}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;margin-top:6px}
    .photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm)}
    .status-toggle{display:flex;border:1px solid var(--color-border);border-radius:var(--radius);overflow:hidden}
    .status-toggle label{flex:1;text-align:center;padding:10px 16px;font-size:.9rem;font-weight:500;cursor:pointer;transition:background .2s,color .2s}
    .status-toggle input{display:none}
    .status-toggle input:checked+label{color:#fff}
    .status-toggle .st-offen input:checked+label{background:var(--color-text-secondary)}
    .status-toggle .st-bezahlt input:checked+label{background:var(--color-success,#388e3c)}
    .status-toggle .st-offen label,.status-toggle .st-bezahlt label{background:var(--color-bg)}
    .position-card{border:1px solid var(--color-border);border-radius:var(--radius);padding:12px;margin-bottom:12px;position:relative}
    .position-card .pos-remove{position:absolute;top:8px;right:8px;width:28px;height:28px;background:none;border:1px solid var(--color-border);border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-error)}
    .position-card .pos-remove:hover{background:var(--color-error);color:#fff}
    .total-sum{font-size:1.15rem;font-weight:700;color:var(--color-primary);padding:12px 0;text-align:right}
  </style>
</head>
<body>

  <!-- LIST VIEW -->
  <div id="listView" class="page">
    <a href="dashboard.html" class="btn-back">&#8592; Zurueck zum Dashboard</a>
    <div class="filter-bar">
      <select class="form-select" id="filterProject"><option value="">Alle Projekte</option></select>
      <select class="form-select" id="filterStatus">
        <option value="">Alle Status</option>
        <option value="offen">Offen</option>
        <option value="bezahlt">Bezahlt</option>
      </select>
      <select class="form-select" id="filterCategory"><option value="">Alle Kategorien</option></select>
    </div>
    <div class="cost-sum" id="costSum">Summe: 0,00 &euro;</div>
    <div id="costList"></div>
    <button class="fab" id="btnNew" title="Neue Kosten">+</button>
  </div>

  <!-- FORM VIEW -->
  <div id="formView" class="page" style="display:none;">
    <button class="btn-back" id="btnBack" type="button">&#8592; Zurueck</button>
    <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:16px;" id="formTitle">Neue Kosten</h2>

    <form id="costForm" novalidate>
      <!-- Common fields -->
      <div class="card">
        <div class="card-title">Kostendaten</div>

        <div class="form-group" id="projectDropdownGroup">
          <label class="form-label">Projekt</label>
          <select class="form-select" id="fProject"><option value="">Kein Projekt</option></select>
        </div>
        <div id="projectNameDisplay" style="display:none;padding:8px 0;font-weight:600;font-size:0.95rem;color:var(--color-primary);"></div>

        <div class="form-group">
          <label class="form-label">Datum <span class="required">*</span></label>
          <input type="date" class="form-input" id="fDate" required>
          <div class="form-warning" id="wDate">Bitte Datum eingeben</div>
        </div>

        <div class="form-group" style="position:relative;">
          <label class="form-label">Mitarbeiter <span class="required">*</span></label>
          <input type="text" class="form-input" id="fEmployee" required autocomplete="off">
          <div class="autocomplete-list" id="acEmployee" style="display:none;"></div>
          <div class="form-warning" id="wEmployee">Bitte Mitarbeiter eingeben</div>
        </div>

        <div class="form-group">
          <label class="form-label">Status</label>
          <div class="status-toggle">
            <span class="st-offen">
              <input type="radio" name="status" id="sOffen" value="offen" checked>
              <label for="sOffen">Offen</label>
            </span>
            <span class="st-bezahlt">
              <input type="radio" name="status" id="sBezahlt" value="bezahlt">
              <label for="sBezahlt">Bezahlt</label>
            </span>
          </div>
        </div>
      </div>

      <!-- Dynamic positions -->
      <div id="positionsContainer"></div>

      <button type="button" class="btn btn-secondary btn-block" id="btnAddPosition" style="margin-bottom:16px;">+ Weitere Position hinzufuegen</button>

      <div class="total-sum" id="totalSum">Gesamt: 0,00 &euro;</div>

      <button type="submit" class="btn btn-primary btn-block">Speichern</button>
      <button type="button" class="btn btn-danger btn-block mt-sm" id="btnDelete" style="display:none;">Loeschen</button>
    </form>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    // --- Constants ---
    var CATEGORIES = ['Hotel','Sprit','Verpflegung','Parken','Maut','Material','Werkzeug','Sonstiges'];
    var CAT_OPTIONS = '<option value="">Bitte waehlen</option>' +
      CATEGORIES.map(function(c) { return '<option value="' + c + '">' + c + '</option>'; }).join('');

    // --- State ---
    var currentId = null;
    var positions = []; // [{ category, amount, notes, photos:[] }]
    var posCounter = 0;

    // --- Init ---
    initApp(function(user) {
      console.log('[Costs] Init start');
      renderNav('costs');
      populateDropdowns();
      setupAutocomplete();

      var editId = getUrlParam('id');
      var isNew = getUrlParam('new');
      if (editId) openForm(editId);
      else if (isNew) openForm(null);
      else showList();

      if (isOnline) {
        syncWithFirebase('costs').then(function() {
          if (!currentId && !isNew) renderList();
        });
      }
    });

    function populateDropdowns() {
      var projects = getActiveItems('projects');
      var opts = projects.map(function(p) {
        return '<option value="' + p.id + '">' + esc(p.name || 'Ohne Bezeichnung') + '</option>';
      }).join('');
      document.getElementById('fProject').innerHTML = '<option value="">Kein Projekt</option>' + opts;
      document.getElementById('filterProject').innerHTML = '<option value="">Alle Projekte</option>' + opts;
      document.getElementById('filterCategory').innerHTML = '<option value="">Alle Kategorien</option>' +
        CATEGORIES.map(function(c) { return '<option value="' + c + '">' + c + '</option>'; }).join('');
    }

    // =============================================
    //  LIST VIEW
    // =============================================

    function showList() {
      document.getElementById('listView').style.display = '';
      document.getElementById('formView').style.display = 'none';
      currentId = null;
      history.replaceState(null, '', 'costs.html');
      renderList();
    }

    function renderList() {
      var costs = getActiveItems('costs');
      var projFilter = document.getElementById('filterProject').value;
      var statusFilter = document.getElementById('filterStatus').value;
      var catFilter = document.getElementById('filterCategory').value;

      var filtered = costs.filter(function(c) {
        if (projFilter && c.projectId !== projFilter) return false;
        if (statusFilter && (c.status || 'offen') !== statusFilter) return false;
        if (catFilter && c.category !== catFilter) return false;
        return true;
      });

      filtered.sort(function(a, b) {
        return (b.date || '').localeCompare(a.date || '');
      });

      var sum = filtered.reduce(function(acc, c) { return acc + (parseFloat(c.amount) || 0); }, 0);
      document.getElementById('costSum').innerHTML = 'Summe: ' + formatEuro(sum);

      var el = document.getElementById('costList');
      if (filtered.length === 0) {
        el.innerHTML = '<p class="list-empty">Noch keine Kosten</p>';
        return;
      }

      el.innerHTML = filtered.map(function(c) {
        var proj = c.projectId ? getItemById('projects', c.projectId) : null;
        var projName = proj ? proj.name : '';
        var status = c.status || 'offen';
        var badgeClass = status === 'bezahlt' ? 'badge-abgeschlossen' : 'badge-entwurf';
        return '<div class="card card-clickable" data-id="' + c.id + '">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;">' +
            '<div>' +
              '<div style="font-weight:600;">' + (c.date ? formatDate(c.date) : 'Ohne Datum') +
                (c.category ? ' — ' + esc(c.category) : '') + '</div>' +
              (c.employee ? '<div style="font-size:.85rem;color:var(--color-text-secondary);">' + esc(c.employee) + '</div>' : '') +
              (projName ? '<div style="font-size:.8rem;color:var(--color-text-secondary);">' + esc(projName) + '</div>' : '') +
            '</div>' +
            '<div style="text-align:right;">' +
              '<div style="font-weight:600;color:var(--color-primary);font-size:1.05rem;">' + formatEuro(c.amount) + '</div>' +
              '<span class="badge ' + badgeClass + '">' + esc(status) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');

      el.querySelectorAll('.card-clickable').forEach(function(card) {
        card.addEventListener('click', function() { openForm(card.getAttribute('data-id')); });
      });
    }

    document.getElementById('filterProject').addEventListener('change', renderList);
    document.getElementById('filterStatus').addEventListener('change', renderList);
    document.getElementById('filterCategory').addEventListener('change', renderList);
    document.getElementById('btnNew').addEventListener('click', function() { openForm(null); });

    // =============================================
    //  FORM VIEW
    // =============================================

    function openForm(id) {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('formView').style.display = '';
      positions = [];
      posCounter = 0;
      clearWarnings();

      var urlProjectId = getUrlParam('projectId');

      if (id) {
        currentId = id;
        var c = getItemById('costs', id);
        if (!c) { showToast('Kosteneintrag nicht gefunden', 'error'); showList(); return; }
        document.getElementById('formTitle').textContent = 'Kosten bearbeiten';
        history.replaceState(null, '', 'costs.html?id=' + id + (urlProjectId ? '&projectId=' + urlProjectId : ''));
        fillForm(c);
        document.getElementById('btnDelete').style.display = '';
        document.getElementById('btnAddPosition').style.display = 'none';
      } else {
        currentId = null;
        document.getElementById('formTitle').textContent = 'Neue Kosten';
        history.replaceState(null, '', 'costs.html?new=1' + (urlProjectId ? '&projectId=' + urlProjectId : ''));
        resetForm();
        document.getElementById('btnDelete').style.display = 'none';
        document.getElementById('btnAddPosition').style.display = '';
      }

      // Set project AFTER resetForm
      if (urlProjectId) {
        document.getElementById('fProject').value = urlProjectId;
        document.getElementById('projectDropdownGroup').style.display = 'none';
        var proj = getItemById('projects', urlProjectId);
        var nameEl = document.getElementById('projectNameDisplay');
        nameEl.textContent = 'Projekt: ' + (proj ? (proj.name || 'Ohne Bezeichnung') : urlProjectId);
        nameEl.style.display = '';
      } else {
        document.getElementById('projectDropdownGroup').style.display = '';
        document.getElementById('projectNameDisplay').style.display = 'none';
      }

      window.scrollTo(0, 0);
    }

    function fillForm(c) {
      document.getElementById('fProject').value = c.projectId || '';
      document.getElementById('fDate').value = c.date || '';
      document.getElementById('fEmployee').value = c.employee || '';
      var status = c.status || 'offen';
      document.getElementById('sOffen').checked = status === 'offen';
      document.getElementById('sBezahlt').checked = status === 'bezahlt';
      // Single position for editing existing record
      positions = [{ category: c.category || '', amount: c.amount || 0, notes: c.notes || '', photos: (c.photos || []).slice() }];
      renderPositions();
    }

    function resetForm() {
      document.getElementById('costForm').reset();
      document.getElementById('sOffen').checked = true;
      document.getElementById('sBezahlt').checked = false;
      positions = [{ category: '', amount: 0, notes: '', photos: [] }];
      renderPositions();
    }

    function clearWarnings() {
      document.querySelectorAll('.form-warning,.form-error').forEach(function(w) {
        w.classList.remove('visible');
      });
    }

    // =============================================
    //  DYNAMIC POSITIONS
    // =============================================

    function addPosition() {
      positions.push({ category: '', amount: 0, notes: '', photos: [] });
      renderPositions();
    }

    document.getElementById('btnAddPosition').addEventListener('click', addPosition);

    function removePosition(idx) {
      if (positions.length <= 1) return;
      positions[idx] = null;
      positions = positions.filter(function(p) { return p !== null; });
      renderPositions();
    }

    function renderPositions() {
      var container = document.getElementById('positionsContainer');
      container.innerHTML = '';

      positions.forEach(function(pos, idx) {
        posCounter++;
        var uid = 'pos_' + posCounter;
        var canRemove = positions.length > 1 && !currentId;

        var card = document.createElement('div');
        card.className = 'position-card';
        card.innerHTML =
          (canRemove ? '<button type="button" class="pos-remove" data-idx="' + idx + '">&times;</button>' : '') +
          '<div style="font-weight:600;font-size:.85rem;margin-bottom:8px;">Position ' + (idx + 1) + '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Kategorie <span class="required">*</span></label>' +
            '<select class="form-select pos-category" data-idx="' + idx + '">' + CAT_OPTIONS + '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Betrag (&euro;) <span class="required">*</span></label>' +
            '<input type="number" class="form-input pos-amount" data-idx="' + idx + '" min="0.01" step="0.01" inputmode="decimal" placeholder="0,00">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Notiz</label>' +
            '<input type="text" class="form-input pos-notes" data-idx="' + idx + '" placeholder="Optional">' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Beleg</label>' +
            '<div class="upload-buttons">' +
              '<button type="button" class="btn btn-secondary pos-btn-photo" data-idx="' + idx + '">&#128247; Foto</button>' +
              '<button type="button" class="btn btn-secondary pos-btn-file" data-idx="' + idx + '">&#128196; Datei</button>' +
              '<input type="file" class="pos-input-photo" data-idx="' + idx + '" accept="image/*" capture="environment">' +
              '<input type="file" class="pos-input-file" data-idx="' + idx + '" accept="image/*,application/pdf" multiple>' +
            '</div>' +
            '<div class="photo-grid pos-photo-grid" data-idx="' + idx + '"></div>' +
          '</div>';

        container.appendChild(card);

        // Set values
        card.querySelector('.pos-category').value = pos.category || '';
        card.querySelector('.pos-amount').value = pos.amount || '';
        card.querySelector('.pos-notes').value = pos.notes || '';

        // Render photos for this position
        renderPosPhotos(idx);

        // Event: remove position
        var removeBtn = card.querySelector('.pos-remove');
        if (removeBtn) {
          removeBtn.addEventListener('click', function() {
            savePositionFields();
            removePosition(parseInt(this.getAttribute('data-idx')));
          });
        }

        // Event: category/amount/notes change → save to state
        card.querySelector('.pos-category').addEventListener('change', function() {
          positions[idx].category = this.value;
        });
        card.querySelector('.pos-amount').addEventListener('input', function() {
          positions[idx].amount = parseFloat(this.value) || 0;
          updateTotalSum();
        });
        card.querySelector('.pos-notes').addEventListener('input', function() {
          positions[idx].notes = this.value;
        });

        // Event: upload buttons
        var btnPhoto = card.querySelector('.pos-btn-photo');
        var btnFile = card.querySelector('.pos-btn-file');
        var inputPhoto = card.querySelector('.pos-input-photo');
        var inputFile = card.querySelector('.pos-input-file');

        btnPhoto.addEventListener('click', function() { inputPhoto.click(); });
        btnFile.addEventListener('click', function() { inputFile.click(); });

        inputPhoto.addEventListener('change', function(e) { handlePosFiles(e, idx); });
        inputFile.addEventListener('change', function(e) { handlePosFiles(e, idx); });
      });

      updateTotalSum();
    }

    function savePositionFields() {
      document.querySelectorAll('.pos-category').forEach(function(el) {
        var i = parseInt(el.getAttribute('data-idx'));
        if (positions[i]) positions[i].category = el.value;
      });
      document.querySelectorAll('.pos-amount').forEach(function(el) {
        var i = parseInt(el.getAttribute('data-idx'));
        if (positions[i]) positions[i].amount = parseFloat(el.value) || 0;
      });
      document.querySelectorAll('.pos-notes').forEach(function(el) {
        var i = parseInt(el.getAttribute('data-idx'));
        if (positions[i]) positions[i].notes = el.value;
      });
    }

    function handlePosFiles(e, posIdx) {
      Array.from(e.target.files).forEach(function(file) {
        if (file.size > 10 * 1024 * 1024) {
          var sizeMB = (file.size / (1024 * 1024)).toFixed(1);
          showToast(file.name + ' zu gross (' + sizeMB + ' MB). Maximum ist 10 MB.', 'error');
          return;
        }
        var isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
        if (isPdf) {
          var reader = new FileReader();
          reader.onload = function() {
            positions[posIdx].photos.push({ dataUrl: reader.result, name: file.name, type: 'pdf' });
            renderPosPhotos(posIdx);
          };
          reader.readAsDataURL(file);
        } else {
          compressImage(file).then(function(blob) {
            var reader = new FileReader();
            reader.onload = function() {
              positions[posIdx].photos.push({ dataUrl: reader.result, name: file.name, type: file.type });
              renderPosPhotos(posIdx);
            };
            reader.readAsDataURL(blob);
          });
        }
      });
      e.target.value = '';
    }

    function renderPosPhotos(posIdx) {
      var grid = document.querySelector('.pos-photo-grid[data-idx="' + posIdx + '"]');
      if (!grid) return;
      var photos = positions[posIdx].photos || [];
      if (photos.length === 0) { grid.innerHTML = ''; return; }
      grid.innerHTML = photos.map(function(p, pIdx) {
        var isPdf = (p.type || '').indexOf('pdf') !== -1;
        var thumb = isPdf
          ? '<div style="width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:var(--color-bg);border-radius:var(--radius-sm);font-size:1.5rem;">&#128196;</div>'
          : '<img src="' + p.dataUrl + '" alt="' + esc(p.name) + '">';
        return '<div style="position:relative;">' + thumb +
          '<button type="button" onclick="removePosPhoto(' + posIdx + ',' + pIdx + ')" style="position:absolute;top:2px;right:2px;width:20px;height:20px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&times;</button>' +
        '</div>';
      }).join('');
    }

    function removePosPhoto(posIdx, photoIdx) {
      positions[posIdx].photos.splice(photoIdx, 1);
      renderPosPhotos(posIdx);
    }

    function updateTotalSum() {
      var total = positions.reduce(function(acc, p) { return acc + (p.amount || 0); }, 0);
      document.getElementById('totalSum').innerHTML = 'Gesamt: ' + formatEuro(total);
    }

    // =============================================
    //  AUTOCOMPLETE
    // =============================================

    function setupAutocomplete() {
      var input = document.getElementById('fEmployee');
      var list = document.getElementById('acEmployee');

      input.addEventListener('input', function() {
        var val = input.value.trim().toLowerCase();
        if (val.length < 1) { list.style.display = 'none'; return; }
        var suggestions = getAutocompleteSuggestions('costs', 'employee')
          .filter(function(s) { return s.toLowerCase().indexOf(val) !== -1; });
        if (suggestions.length === 0) { list.style.display = 'none'; return; }
        list.innerHTML = suggestions.map(function(s) {
          return '<div class="autocomplete-item">' + esc(s) + '</div>';
        }).join('');
        list.style.display = '';
        list.querySelectorAll('.autocomplete-item').forEach(function(item) {
          item.addEventListener('click', function() {
            input.value = item.textContent;
            list.style.display = 'none';
          });
        });
      });

      input.addEventListener('blur', function() {
        setTimeout(function() { list.style.display = 'none'; }, 200);
      });
    }

    // =============================================
    //  SAVE
    // =============================================

    document.getElementById('costForm').addEventListener('submit', function(e) {
      e.preventDefault();
      console.log('[Costs] Save triggered');

      try {
        clearWarnings();
        savePositionFields();

        var projectId = document.getElementById('fProject').value;
        var date = document.getElementById('fDate').value;
        var employee = document.getElementById('fEmployee').value.trim();
        var statusVal = document.querySelector('input[name="status"]:checked');
        var status = statusVal ? statusVal.value : 'offen';

        var proj = projectId ? getItemById('projects', projectId) : null;
        var projectName = proj ? proj.name : '';

        // Validation warnings
        var hasWarning = false;
        if (!date) { document.getElementById('wDate').classList.add('visible'); hasWarning = true; }
        if (!employee) { document.getElementById('wEmployee').classList.add('visible'); hasWarning = true; }

        // Date not in the future
        if (date && date > new Date().toISOString().split('T')[0]) {
          showToast('Datum darf nicht in der Zukunft liegen', 'warning');
        }

        if (currentId) {
          // Editing existing single record
          var pos = positions[0] || {};
          var data = {
            projectId: projectId,
            projectName: projectName,
            date: date,
            employee: employee,
            category: pos.category || '',
            amount: pos.amount || 0,
            notes: pos.notes || '',
            status: status,
            photos: (pos.photos || []).slice()
          };

          if (!data.category) hasWarning = true;
          if (!data.amount || data.amount <= 0) hasWarning = true;

          saveToLocal('costs', currentId, data);
          if (isOnline) syncItemToFirebase('costs', currentId, data);

          showToast(hasWarning ? 'Gespeichert (fehlende Pflichtfelder)' : 'Kosten gespeichert', hasWarning ? 'warning' : 'success');
          document.getElementById('formTitle').textContent = 'Kosten bearbeiten';
          document.getElementById('btnDelete').style.display = '';
        } else {
          // New: save each position as own record
          var savedIds = [];
          positions.forEach(function(pos) {
            var data = {
              projectId: projectId,
              projectName: projectName,
              date: date,
              employee: employee,
              category: pos.category || '',
              amount: pos.amount || 0,
              notes: pos.notes || '',
              status: status,
              photos: (pos.photos || []).slice()
            };

            if (!data.category || !data.amount || data.amount <= 0) hasWarning = true;

            var id = generateId();
            saveToLocal('costs', id, data);
            if (isOnline) syncItemToFirebase('costs', id, data);
            savedIds.push(id);
          });

          var count = savedIds.length;
          showToast(count + ' Kostenposition' + (count > 1 ? 'en' : '') + ' gespeichert' +
            (hasWarning ? ' (fehlende Pflichtfelder)' : ''), hasWarning ? 'warning' : 'success');

          // Navigate back to project or list
          var urlProjId = getUrlParam('projectId');
          if (urlProjId) {
            window.location.href = 'projects.html?id=' + urlProjId;
            return;
          } else if (savedIds.length === 1) {
            currentId = savedIds[0];
            history.replaceState(null, '', 'costs.html?id=' + currentId);
            document.getElementById('formTitle').textContent = 'Kosten bearbeiten';
            document.getElementById('btnDelete').style.display = '';
            document.getElementById('btnAddPosition').style.display = 'none';
          } else {
            showList();
            return;
          }
        }
      } catch (err) {
        console.error('[Costs] Save error:', err);
        showToast('Fehler: ' + err.message, 'error');
      }
    });

    // =============================================
    //  DELETE / BACK
    // =============================================

    document.getElementById('btnDelete').addEventListener('click', function() {
      if (!currentId) return;
      var c = getItemById('costs', currentId);
      if (softDelete('costs', currentId, c ? (c.category + ' ' + formatEuro(c.amount)) : '')) {
        showToast('Kosteneintrag geloescht', 'success');
        var urlProjId = getUrlParam('projectId');
        if (urlProjId) {
          window.location.href = 'projects.html?id=' + urlProjId;
        } else {
          showList();
        }
      }
    });

    (function() {
      var projId = getUrlParam('projectId');
      var btn = document.getElementById('btnBack');
      if (projId) {
        btn.innerHTML = '&#8592; Zurueck zum Projekt';
      }
      btn.addEventListener('click', function() {
        var pId = getUrlParam('projectId');
        if (pId) {
          window.location.href = 'projects.html?id=' + pId;
        } else {
          showList();
        }
      });
    })();

    // =============================================
    //  HELPERS
    // =============================================

    function formatEuro(val) {
      var num = parseFloat(val) || 0;
      return num.toLocaleString('de-DE', { style: 'currency', currency: 'EUR' });
    }

    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
