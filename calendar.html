<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kalender – Flexfundament</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1565c0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <div class="page" id="page" style="display:none;">
    <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:var(--spacing-md);">Kalender</h2>
    <div class="card" style="text-align:center;padding:var(--spacing-xl) var(--spacing-md);">
      <div style="font-size:2rem;margin-bottom:var(--spacing-md);">&#128197;</div>
      <div style="font-weight:600;margin-bottom:var(--spacing-sm);">Kalender wird vorbereitet</div>
      <p class="text-secondary" style="font-size:0.9rem;margin-bottom:var(--spacing-lg);">
        Die Kalenderansicht ist noch nicht implementiert.<br>
        Termine sind über das Dashboard einsehbar.
      </p>
      <a href="dashboard.html" class="btn btn-primary">Zum Dashboard</a>
    </div>
  </div>

  <!-- Firebase SDK (compat v10.12.0) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    initApp(function(user) {
      renderNav('calendar');
      document.getElementById('page').style.display = '';
    });
  </script>
</body>
</html>
