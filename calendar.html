<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kalender – Flexfundament</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005A9C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <div class="page" id="page">

    <!-- Month navigation -->
    <div class="cal-header">
      <button class="cal-nav-btn" id="btnPrev">&#8249;</button>
      <span class="cal-month-title" id="calMonthTitle"></span>
      <button class="cal-nav-btn" id="btnNext">&#8250;</button>
    </div>

    <!-- Calendar grid -->
    <div class="card cal-card">
      <table class="cal-table" id="calGrid"></table>
    </div>

    <!-- Legend -->
    <div class="cal-legend">
      <span class="cal-legend-item">
        <span class="cal-dot cal-dot-project"></span> Projekt
      </span>
      <span class="cal-legend-item">
        <span class="cal-dot cal-dot-report"></span> Bericht
      </span>
    </div>

    <!-- Day detail panel (shown on tap) -->
    <div id="calDetail"></div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>

    var currentYear, currentMonth, selectedDate = null;
    var projectMap = {};  // 'YYYY-MM-DD' → [project, ...]
    var reportMap  = {};  // 'YYYY-MM-DD' → [report, ...]

    initApp(function() {
      renderNav('calendar');

      var now = new Date();
      currentYear  = now.getFullYear();
      currentMonth = now.getMonth();

      document.getElementById('btnPrev').addEventListener('click', function() {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        selectedDate = null;
        document.getElementById('calDetail').innerHTML = '';
        render();
      });
      document.getElementById('btnNext').addEventListener('click', function() {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        selectedDate = null;
        document.getElementById('calDetail').innerHTML = '';
        render();
      });

      loadAndRender();
    });

    // ---------------------------------------------------------------
    // Data loading
    // ---------------------------------------------------------------
    function loadAndRender() {
      if (isOnline) {
        Promise.all([
          syncWithFirebase('projects'),
          syncWithFirebase('reports')
        ]).then(buildMapsAndRender);
      } else {
        buildMapsAndRender();
      }
    }

    function buildMapsAndRender() {
      projectMap = {};
      reportMap  = {};

      getActiveItems('projects').forEach(function(p) {
        var d = p.executionDate;
        if (!d) return;
        if (!projectMap[d]) projectMap[d] = [];
        projectMap[d].push(p);
      });

      getActiveItems('reports').forEach(function(r) {
        var d = r.date;
        if (!d) return;
        if (!reportMap[d]) reportMap[d] = [];
        reportMap[d].push(r);
      });

      render();
    }

    // ---------------------------------------------------------------
    // Render month grid
    // ---------------------------------------------------------------
    var MONTHS   = ['Januar','Februar','März','April','Mai','Juni',
                    'Juli','August','September','Oktober','November','Dezember'];
    var WEEKDAYS = ['Mo','Di','Mi','Do','Fr','Sa','So'];

    function render() {
      var todayStr = new Date().toISOString().split('T')[0];

      document.getElementById('calMonthTitle').textContent =
        MONTHS[currentMonth] + ' ' + currentYear;

      var firstDay   = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
      var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      var startOffset = (firstDay + 6) % 7; // Mon=0 … Sun=6

      // Header row
      var html = '<thead><tr>';
      WEEKDAYS.forEach(function(d) {
        html += '<th class="cal-th">' + d + '</th>';
      });
      html += '</tr></thead><tbody><tr>';

      // Empty cells before first day
      for (var e = 0; e < startOffset; e++) html += '<td></td>';

      for (var day = 1; day <= daysInMonth; day++) {
        var dateStr = currentYear + '-' +
          String(currentMonth + 1).padStart(2,'0') + '-' +
          String(day).padStart(2,'0');

        var isToday    = dateStr === todayStr;
        var isSelected = dateStr === selectedDate;
        var hasProject = !!projectMap[dateStr];
        var hasReport  = !!reportMap[dateStr];

        var cellClass = 'cal-day';
        if (isToday)    cellClass += ' cal-day-today';
        if (isSelected) cellClass += ' cal-day-selected';

        var dots = '';
        if (hasProject) dots += '<span class="cal-dot cal-dot-project"></span>';
        if (hasReport)  dots += '<span class="cal-dot cal-dot-report"></span>';

        html += '<td><div class="' + cellClass + '" data-date="' + dateStr + '">' +
          '<span class="cal-day-num">' + day + '</span>' +
          (dots ? '<div class="cal-dots">' + dots + '</div>' : '') +
          '</div></td>';

        // New row after Sunday (every 7 cells after offset)
        if ((startOffset + day) % 7 === 0 && day < daysInMonth) {
          html += '</tr><tr>';
        }
      }

      // Fill remaining cells
      var filled = (startOffset + daysInMonth) % 7;
      if (filled > 0) {
        for (var r = filled; r < 7; r++) html += '<td></td>';
      }
      html += '</tr></tbody>';

      document.getElementById('calGrid').innerHTML = html;

      // Click handlers
      document.getElementById('calGrid').querySelectorAll('[data-date]').forEach(function(cell) {
        cell.addEventListener('click', function() {
          var d = cell.getAttribute('data-date');
          if (d === selectedDate) {
            // Deselect
            selectedDate = null;
            cell.classList.remove('cal-day-selected');
            document.getElementById('calDetail').innerHTML = '';
          } else {
            selectedDate = d;
            render();          // re-render to move selection highlight
            showDetail(d);
          }
        });
      });

      // Restore detail if a date is selected
      if (selectedDate) showDetail(selectedDate);
    }

    // ---------------------------------------------------------------
    // Day detail panel
    // ---------------------------------------------------------------
    function showDetail(dateStr) {
      var projects = projectMap[dateStr] || [];
      var reports  = reportMap[dateStr]  || [];

      if (projects.length === 0 && reports.length === 0) {
        document.getElementById('calDetail').innerHTML =
          '<div class="section-title">' + formatDate(dateStr) + '</div>' +
          '<div class="card"><p class="list-empty" style="padding:var(--spacing-md);">Keine Einträge</p></div>';
        return;
      }

      var html = '<div class="section-title">' + formatDate(dateStr) + '</div>' +
        '<div class="card" style="padding:0;">';

      if (projects.length > 0) {
        html += projects.map(function(p) {
          var sub = [];
          if (p.executionTime) sub.push(formatTime(p.executionTime) + ' Uhr');
          var addr = [p.street, p.city].filter(Boolean).join(', ');
          if (addr) sub.push(esc(addr));
          var badgeClass = p.status === 'abgeschlossen' ? 'badge-abgeschlossen' : 'badge-aktiv';
          return '<a href="projects.html?id=' + p.id + '" class="cal-detail-row cal-row-project">' +
            '<div class="cal-detail-body">' +
              '<div class="cal-detail-title">' +
                '<span class="cal-detail-title-text">' + esc(p.name || 'Projekt') + '</span>' +
                '<span class="badge ' + badgeClass + '">' + (p.status || 'aktiv') + '</span>' +
              '</div>' +
              (sub.length ? '<div class="cal-detail-sub">' + sub.join(' · ') + '</div>' : '') +
            '</div>' +
            '<div class="cal-detail-arrow">&#8250;</div>' +
          '</a>';
        }).join('');
      }

      if (reports.length > 0) {
        html += reports.map(function(r) {
          var workers = (r.workers || []).join(', ');
          var badgeClass = r.status === 'abgeschlossen' ? 'badge-abgeschlossen' : 'badge-entwurf';
          return '<a href="reports.html?id=' + r.id + '" class="cal-detail-row cal-row-report">' +
            '<div class="cal-detail-body">' +
              '<div class="cal-detail-title">' +
                '<span class="cal-detail-title-text">' + esc(r.projectName || 'Einsatzbericht') + '</span>' +
                '<span class="badge ' + badgeClass + '">' + (r.status || 'entwurf') + '</span>' +
              '</div>' +
              (workers ? '<div class="cal-detail-sub">' + esc(workers) + '</div>' : '') +
            '</div>' +
            '<div class="cal-detail-arrow">&#8250;</div>' +
          '</a>';
        }).join('');
      }

      html += '</div>';
      document.getElementById('calDetail').innerHTML = html;

      // Scroll detail into view on mobile
      setTimeout(function() {
        var el = document.getElementById('calDetail');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }

    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

  </script>
</body>
</html>
