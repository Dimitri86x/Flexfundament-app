<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flexfundament App – Dashboard</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#515052">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <div class="page" id="page">

    <!-- Greeting -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--spacing-md);">
      <div>
        <h1 style="font-size:1.25rem; font-weight:600;" id="greeting">Hallo!</h1>
        <p class="text-secondary" style="font-size:0.85rem;" id="greetingDate"></p>
      </div>
      <button class="btn-link-muted" id="btnLogout">Abmelden</button>
    </div>

    <!-- Quick Actions -->
    <div class="quick-buttons" style="margin-bottom:var(--spacing-lg);">
      <a href="reports.html?new=1" class="quick-btn">
        <span class="quick-btn-icon">&#128203;</span>
        Neuer Bericht
      </a>
      <a href="projects.html?new=1" class="quick-btn">
        <span class="quick-btn-icon">&#128204;</span>
        Neues Projekt
      </a>
      <a href="drives.html?new=1" class="quick-btn">
        <span class="quick-btn-icon">&#128663;</span>
        Neue Fahrt
      </a>
      <a href="costs.html?new=1" class="quick-btn">
        <span class="quick-btn-icon">&#128176;</span>
        Neue Kosten
      </a>
    </div>

    <!-- Upcoming Appointments (today + next 7 days, hidden if none) -->
    <div id="sectionTermine"></div>

    <!-- Open Reports (hidden if none) -->
    <div id="sectionReports"></div>

    <!-- Open Costs (hidden if none) -->
    <div id="sectionCosts"></div>

  </div>

  <!-- Firebase SDK (compat v10.12.0) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    initApp(function(user) {
      renderNav('dashboard');

      // Greeting
      var name = user.displayName || user.email || 'Benutzer';
      document.getElementById('greeting').textContent = 'Hallo, ' + name.split(' ')[0] + '!';
      var now = new Date();
      var days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
      var months = ['Januar','Februar','Maerz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
      document.getElementById('greetingDate').textContent =
        days[now.getDay()] + ', ' + now.getDate() + '. ' + months[now.getMonth()] + ' ' + now.getFullYear();

      document.getElementById('btnLogout').addEventListener('click', signOut);

      if (isOnline) {
        Promise.all([
          syncWithFirebase('projects'),
          syncWithFirebase('reports'),
          syncWithFirebase('costs')
        ]).then(refreshWidgets);
      } else {
        refreshWidgets();
      }
    });

    function refreshWidgets() {
      renderTermineWidget();
      renderReportsWidget();
      renderCostsWidget();
    }

    // Returns a section block, or empty string if no items
    function makeSection(title, itemsHtml) {
      if (!itemsHtml) return '';
      return '<div class="section-title">' + title + '</div>' +
             '<div class="card" style="margin-bottom:var(--spacing-md);">' + itemsHtml + '</div>';
    }

    function makeRow(href, primary, secondary, badge) {
      return '<a href="' + href + '" class="card-clickable" ' +
        'style="display:block;padding:10px 0;border-bottom:1px solid var(--color-border);">' +
        '<span style="font-weight:500;">' + esc(primary) + '</span>' +
        (secondary ? ' <span class="text-secondary" style="font-size:0.85rem;">' + secondary + '</span>' : '') +
        (badge ? ' ' + badge : '') +
        '</a>';
    }

    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function renderTermineWidget() {
      var todayStr = new Date().toISOString().split('T')[0];
      var limitDate = new Date();
      limitDate.setDate(limitDate.getDate() + 7);
      var limitStr = limitDate.toISOString().split('T')[0];

      var items = filterProjectsByAccess(getActiveItems('projects')).filter(function(p) {
        return p.executionDate && p.executionDate >= todayStr && p.executionDate <= limitStr;
      }).sort(function(a, b) {
        return (a.executionDate + (a.executionTime || '')).localeCompare(b.executionDate + (b.executionTime || ''));
      });

      if (items.length === 0) {
        document.getElementById('sectionTermine').innerHTML = '';
        return;
      }

      var rows = items.map(function(p) {
        var isToday = p.executionDate === todayStr;
        var dateLabel = isToday
          ? ('Heute' + (p.executionTime ? ', ' + p.executionTime.substring(0, 5) : ''))
          : (formatDate(p.executionDate) + (p.executionTime ? ', ' + p.executionTime.substring(0, 5) : ''));
        var badgeClass = p.status === 'abgeschlossen' ? 'badge-abgeschlossen' : 'badge-aktiv';
        var badge = '<span class="badge ' + badgeClass + '">' + (p.status || 'aktiv') + '</span>';
        return makeRow('projects.html?id=' + p.id, p.name || 'Projekt', dateLabel, badge);
      }).join('');

      document.getElementById('sectionTermine').innerHTML =
        makeSection('Termine', rows);
    }

    function renderReportsWidget() {
      var reports = getActiveItems('reports')
        .filter(function(r) { return r.status === 'entwurf'; })
        .slice(0, 5);

      if (reports.length === 0) {
        document.getElementById('sectionReports').innerHTML = '';
        return;
      }

      var rows = reports.map(function(r) {
        var date = r.date ? formatDate(r.date) : '';
        var badge = '<span class="badge badge-entwurf">Entwurf</span>';
        return makeRow('reports.html?id=' + r.id, r.projectName || 'Einsatzbericht', date, badge);
      }).join('');

      document.getElementById('sectionReports').innerHTML =
        makeSection('Offene Einsatzberichte', rows);
    }

    function renderCostsWidget() {
      var costs = getActiveItems('costs').filter(function(c) { return c.status !== 'bezahlt'; });

      if (costs.length === 0) {
        document.getElementById('sectionCosts').innerHTML = '';
        return;
      }

      var total = costs.reduce(function(sum, c) { return sum + (parseFloat(c.amount) || 0); }, 0);

      var rows = costs.slice(0, 5).map(function(c) {
        var amount = (parseFloat(c.amount) || 0).toFixed(2).replace('.', ',') + '\u00a0\u20ac';
        var date = c.date ? formatDate(c.date) : '';
        return makeRow('costs.html?id=' + c.id, (c.category || 'Kosten') + ' \u2014 ' + amount, date, '');
      }).join('');

      var totalLine = '<div style="font-weight:600;padding:4px 0 10px;border-bottom:1px solid var(--color-border);color:var(--color-text);">' +
        'Gesamt offen: ' + total.toFixed(2).replace('.', ',') + '\u00a0\u20ac</div>';

      document.getElementById('sectionCosts').innerHTML =
        makeSection('Offene Kosten', totalLine + rows);
    }
  </script>
</body>
</html>
