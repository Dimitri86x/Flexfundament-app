<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flexfundament App – Dashboard</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1565c0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <div class="page" id="page">
    <!-- Greeting -->
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--spacing-md);">
      <div>
        <h1 style="font-size:1.25rem; font-weight:600;" id="greeting">Hallo!</h1>
        <p class="text-secondary" style="font-size:0.85rem;" id="greetingDate"></p>
      </div>
      <button class="btn btn-secondary" id="btnLogout" style="font-size:0.8rem;">Abmelden</button>
    </div>

    <!-- Quick Buttons -->
    <div class="quick-buttons">
      <a href="projects.html?new=1" class="quick-btn">
        <span class="quick-btn-icon">&#128204;</span>
        Neues Projekt anlegen
      </a>
      <a href="projects.html" class="quick-btn">
        <span class="quick-btn-icon">&#128194;</span>
        Projekte
      </a>
    </div>

    <!-- Today's Appointments -->
    <div class="section-title">Heutige Termine</div>
    <div id="widgetToday" class="card">
      <p class="list-empty">Noch keine Daten</p>
    </div>

    <!-- Month Calendar -->
    <div class="section-title">Monatsuebersicht</div>
    <div id="widgetCalendar" class="card">
      <div id="calMonth" style="font-weight:600;text-align:center;margin-bottom:8px;"></div>
      <table id="calGrid" style="width:100%;border-collapse:collapse;font-size:0.8rem;text-align:center;"></table>
      <div id="calDayDetail" style="margin-top:8px;"></div>
    </div>

    <!-- Open Reports -->
    <div class="section-title">Offene Einsatzberichte</div>
    <div id="widgetReports" class="card">
      <p class="list-empty">Noch keine Daten</p>
    </div>

    <!-- Recent Drives -->
    <div class="section-title">Letzte Fahrten</div>
    <div id="widgetDrives" class="card">
      <p class="list-empty">Noch keine Daten</p>
    </div>

    <!-- Open Costs -->
    <div class="section-title">Offene Kosten</div>
    <div id="widgetCosts" class="card">
      <p class="list-empty">Noch keine Daten</p>
    </div>
  </div>

  <!-- Firebase SDK (compat v10.12.0) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    initApp(function(user) {
      // Render navigation
      renderNav('dashboard');

      // Set greeting
      var name = user.displayName || user.email || 'Benutzer';
      var firstName = name.split(' ')[0];
      document.getElementById('greeting').textContent = 'Hallo, ' + firstName + '!';

      // Set date
      var now = new Date();
      var days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
      var months = ['Januar','Februar','Maerz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
      document.getElementById('greetingDate').textContent =
        days[now.getDay()] + ', ' + now.getDate() + '. ' + months[now.getMonth()] + ' ' + now.getFullYear();

      // Logout
      document.getElementById('btnLogout').addEventListener('click', function() {
        signOut();
      });

      // Sync data, then refresh widgets
      if (isOnline) {
        Promise.all([
          syncWithFirebase('projects'),
          syncWithFirebase('reports'),
          syncWithFirebase('drives'),
          syncWithFirebase('costs')
        ]).then(refreshWidgets);
      } else {
        refreshWidgets();
      }
    });

    function refreshWidgets() {
      renderTodayWidget();
      renderCalendarWidget();
      renderReportsWidget();
      renderDrivesWidget();
      renderCostsWidget();
    }

    function renderTodayWidget() {
      var container = document.getElementById('widgetToday');
      var today = new Date().toISOString().split('T')[0];

      var projects = getActiveItems('projects').filter(function(p) {
        return p.executionDate === today;
      });

      if (projects.length === 0) {
        container.innerHTML = '<p class="list-empty">Keine Termine heute</p>';
        return;
      }

      container.innerHTML = projects.map(function(p) {
        var status = p.status || 'aktiv';
        var badgeClass = status === 'abgeschlossen' ? 'badge-abgeschlossen' : 'badge-aktiv';
        return '<a href="projects.html?id=' + p.id + '" class="card-clickable" style="display:block;padding:8px 0;border-bottom:1px solid var(--color-border);">' +
               '<strong>' + escapeHtml(p.name || 'Projekt') + '</strong>' +
               (p.executionTime ? ' <span class="text-secondary">' + p.executionTime.substring(0,5) + '</span>' : '') +
               ' <span class="badge ' + badgeClass + '">' + status + '</span></a>';
      }).join('');
    }

    function renderCalendarWidget() {
      var now = new Date();
      var year = now.getFullYear();
      var month = now.getMonth();
      var monthNames = ['Januar','Februar','Maerz','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

      document.getElementById('calMonth').textContent = monthNames[month] + ' ' + year;

      // Get projects with dates in this month
      var projects = getActiveItems('projects');
      var dateMap = {}; // 'YYYY-MM-DD' -> [projects]
      projects.forEach(function(p) {
        if (!p.executionDate) return;
        var d = new Date(p.executionDate);
        if (d.getFullYear() === year && d.getMonth() === month) {
          if (!dateMap[p.executionDate]) dateMap[p.executionDate] = [];
          dateMap[p.executionDate].push(p);
        }
      });

      // Build calendar grid
      var firstDay = new Date(year, month, 1).getDay(); // 0=Sun
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var todayStr = now.toISOString().split('T')[0];

      // Start on Monday (adjust firstDay: 0=Sun -> 6, 1=Mon -> 0, etc.)
      var startOffset = (firstDay + 6) % 7;

      var html = '<thead><tr>';
      ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(function(d) {
        html += '<th style="padding:4px;color:var(--color-text-secondary);font-weight:500;font-size:0.75rem;">' + d + '</th>';
      });
      html += '</tr></thead><tbody><tr>';

      // Empty cells before first day
      for (var e = 0; e < startOffset; e++) {
        html += '<td style="padding:4px;"></td>';
      }

      for (var day = 1; day <= daysInMonth; day++) {
        var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        var hasProjects = dateMap[dateStr];
        var isToday = dateStr === todayStr;

        var bg = 'transparent';
        var cursor = 'default';
        if (hasProjects) {
          var allDone = hasProjects.every(function(p) { return p.status === 'abgeschlossen'; });
          bg = allDone ? '#c8e6c9' : '#e0e0e0';
          cursor = 'pointer';
        }

        var todayBorder = isToday ? 'border:2px solid var(--color-primary);' : '';

        html += '<td style="padding:2px;">' +
          '<div data-cal-date="' + dateStr + '" style="width:32px;height:32px;margin:auto;display:flex;align-items:center;justify-content:center;' +
          'border-radius:50%;background:' + bg + ';cursor:' + cursor + ';font-size:0.8rem;' + todayBorder + '">' +
          day + '</div></td>';

        if ((startOffset + day) % 7 === 0 && day < daysInMonth) {
          html += '</tr><tr>';
        }
      }

      // Fill remaining cells
      var remaining = (startOffset + daysInMonth) % 7;
      if (remaining > 0) {
        for (var r = remaining; r < 7; r++) {
          html += '<td style="padding:4px;"></td>';
        }
      }
      html += '</tr></tbody>';

      document.getElementById('calGrid').innerHTML = html;

      // Click on days with projects
      document.getElementById('calGrid').querySelectorAll('[data-cal-date]').forEach(function(cell) {
        cell.addEventListener('click', function() {
          var d = cell.getAttribute('data-cal-date');
          if (dateMap[d]) showCalDayDetail(d, dateMap[d]);
        });
      });

      document.getElementById('calDayDetail').innerHTML = '';
    }

    function showCalDayDetail(dateStr, projects) {
      var detail = document.getElementById('calDayDetail');
      detail.innerHTML = '<div style="font-weight:600;font-size:0.85rem;margin-bottom:4px;">' + formatDate(dateStr) + ':</div>' +
        projects.map(function(p) {
          var status = p.status || 'aktiv';
          var badgeClass = status === 'abgeschlossen' ? 'badge-abgeschlossen' : 'badge-aktiv';
          return '<a href="projects.html?id=' + p.id + '" style="display:block;padding:4px 0;font-size:0.85rem;">' +
            escapeHtml(p.name || 'Projekt') +
            (p.executionTime ? ' ' + p.executionTime.substring(0,5) : '') +
            ' <span class="badge ' + badgeClass + '">' + status + '</span></a>';
        }).join('');
    }

    function renderReportsWidget() {
      var container = document.getElementById('widgetReports');
      var reports = getActiveItems('reports')
        .filter(function(r) { return r.status === 'entwurf'; })
        .slice(0, 5);

      if (reports.length === 0) {
        container.innerHTML = '<p class="list-empty">Keine offenen Berichte</p>';
        return;
      }

      container.innerHTML = reports.map(function(r) {
        var label = r.projectName || 'Einsatzbericht';
        var date = r.date ? formatDate(r.date) : '';
        return '<a href="reports.html?id=' + r.id + '" class="card-clickable" style="display:block;padding:8px 0;border-bottom:1px solid var(--color-border);">' +
               '<strong>' + escapeHtml(label) + '</strong>' +
               (date ? ' <span class="text-secondary">' + date + '</span>' : '') +
               ' <span class="badge badge-entwurf">Entwurf</span></a>';
      }).join('');
    }

    function renderDrivesWidget() {
      var container = document.getElementById('widgetDrives');
      var drives = getActiveItems('drives').slice(0, 5);

      if (drives.length === 0) {
        container.innerHTML = '<p class="list-empty">Keine Fahrten</p>';
        return;
      }

      container.innerHTML = drives.map(function(d) {
        var route = (d.startLocation || '?') + ' → ' + (d.endLocation || '?');
        var date = d.date ? formatDate(d.date) : '';
        var km = d.kmDriven || '';
        return '<a href="drives.html?id=' + d.id + '" class="card-clickable" style="display:block;padding:8px 0;border-bottom:1px solid var(--color-border);">' +
               '<strong>' + escapeHtml(route) + '</strong>' +
               (km ? ' <span class="text-secondary">' + km + ' km</span>' : '') +
               (date ? '<br><span class="text-secondary">' + date + '</span>' : '') +
               '</a>';
      }).join('');
    }

    function renderCostsWidget() {
      var container = document.getElementById('widgetCosts');
      var costs = getActiveItems('costs')
        .filter(function(c) { return c.status !== 'bezahlt'; });

      var total = costs.reduce(function(sum, c) { return sum + (parseFloat(c.amount) || 0); }, 0);
      var display = costs.slice(0, 5);

      if (display.length === 0) {
        container.innerHTML = '<p class="list-empty">Keine offenen Kosten</p>';
        return;
      }

      var html = '<div style="font-weight:600;margin-bottom:8px;">Gesamt: ' + total.toFixed(2).replace('.', ',') + ' &euro;</div>';
      html += display.map(function(c) {
        var label = c.category || 'Kosten';
        var amount = parseFloat(c.amount) || 0;
        var date = c.date ? formatDate(c.date) : '';
        return '<a href="costs.html?id=' + c.id + '" class="card-clickable" style="display:block;padding:8px 0;border-bottom:1px solid var(--color-border);">' +
               '<strong>' + escapeHtml(label) + '</strong> ' + amount.toFixed(2).replace('.', ',') + ' &euro;' +
               (date ? '<br><span class="text-secondary">' + date + '</span>' : '') +
               '</a>';
      }).join('');

      container.innerHTML = html;
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
