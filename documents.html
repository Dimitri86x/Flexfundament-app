<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flexfundament App – Dokumente</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#515052">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    .upload-buttons{display:flex;gap:8px;flex-wrap:wrap}
    .upload-buttons .btn{font-size:.8rem;padding:8px 12px}
    .upload-buttons input[type="file"]{display:none}
    .doc-card-thumb{width:48px;height:48px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--color-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f5f5f5;font-size:.6rem;text-align:center;color:var(--color-text-secondary)}
    .doc-card-thumb img{width:100%;height:100%;object-fit:cover}
    .doc-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
    .doc-actions .btn{font-size:.7rem;padding:4px 8px;min-height:32px}
    .doc-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .doc-overlay img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
    .position-card{border:1px solid var(--color-border);border-radius:var(--radius);padding:12px;margin-bottom:12px;position:relative}
    .position-card .pos-remove{position:absolute;top:8px;right:8px;width:28px;height:28px;background:none;border:1px solid var(--color-border);border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-error)}
    .position-card .pos-remove:hover{background:var(--color-error);color:#fff}
    .pos-file-list{margin-top:6px;display:flex;flex-direction:column;gap:6px}
    .pos-file-item{display:flex;align-items:center;gap:8px;padding:6px;background:#fafafa;border-radius:var(--radius-sm)}
    .pos-file-thumb{width:40px;height:40px;border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f0f0f0}
    .pos-file-thumb img{width:100%;height:100%;object-fit:cover}
    .pos-file-info{flex:1;min-width:0}
    .pos-file-name{font-size:.8rem;word-break:break-all}
    .pos-file-size{font-size:.7rem;color:var(--color-text-secondary)}
    .pos-file-remove{width:24px;height:24px;border:none;background:none;color:var(--color-error);font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .upload-progress{margin-top:8px;display:none}
    .upload-progress.active{display:block}
    .upload-progress-bar{height:6px;background:var(--color-border);border-radius:3px;overflow:hidden}
    .upload-progress-fill{height:100%;background:var(--color-primary);border-radius:3px;width:0%;transition:width .2s}
    .upload-progress-text{font-size:.75rem;color:var(--color-text-secondary);margin-top:4px}
  </style>
</head>
<body>

  <!-- LIST VIEW -->
  <div id="listView" class="page">
    <a href="dashboard.html" class="btn-back">&#8592; Zurueck zum Dashboard</a>
    <div class="filter-bar">
      <select class="form-select" id="filterProject"><option value="">Alle Projekte</option></select>
      <select class="form-select" id="filterDocType"><option value="">Alle Typen</option></select>
    </div>
    <div id="docList"></div>
    <button class="fab" id="btnNew" title="Neues Dokument">+</button>
  </div>

  <!-- FORM VIEW -->
  <div id="formView" class="page" style="display:none;">
    <button class="btn-back" id="btnBack" type="button">&#8592; Zurueck</button>
    <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:16px;" id="formTitle">Neues Dokument</h2>

    <form id="docForm" novalidate>
      <div class="card">
        <div class="form-group" id="projectDropdownGroup">
          <label class="form-label">Projekt <span class="required">*</span></label>
          <select class="form-select" id="fProject" required><option value="">Bitte waehlen</option></select>
          <div class="form-warning" id="wProject">Bitte Projekt waehlen</div>
        </div>
        <div id="projectNameDisplay" style="display:none;padding:8px 0;font-weight:600;font-size:0.95rem;color:var(--color-primary);"></div>

        <div class="form-group">
          <label class="form-label">Datum</label>
          <input type="date" class="form-input" id="fDate">
        </div>
      </div>

      <!-- Dynamic positions -->
      <div id="positionsContainer"></div>

      <button type="button" class="btn btn-secondary btn-block" id="btnAddPosition" style="margin-bottom:16px;">+ Weitere Position hinzufuegen</button>

      <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar"><div class="upload-progress-fill" id="uploadProgressFill"></div></div>
        <div class="upload-progress-text" id="uploadProgressText">Wird hochgeladen...</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Speichern</button>
      <button type="button" class="btn btn-danger btn-block mt-sm" id="btnDelete" style="display:none;">Loeschen</button>
    </form>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    // --- Constants ---
    var DOC_TYPES = ['Belastungsversuch PDF','Bodengutachten','Lageplan','Statik/Lastangaben',
      'Fundamentplan','Bauplaene','Richtpreisangebot','Foto','Sonstiges'];
    var DOC_TYPE_OPTIONS = '<option value="">Bitte waehlen</option>' +
      DOC_TYPES.map(function(t) { return '<option value="' + t + '">' + t + '</option>'; }).join('');

    // --- State ---
    var currentId = null;
    var isEditMode = false;
    var positions = []; // [{ docType, description, files:[{ dataUrl, name, type, size, cloudUrl }] }]
    var posCounter = 0;

    // --- Init ---
    initApp(function(user) {
      renderNav('documents');
      populateDropdowns();

      var editId = getUrlParam('id');
      var isNew = getUrlParam('new');
      if (editId) openForm(editId);
      else if (isNew) openForm(null);
      else showList();

      if (isOnline) {
        syncWithFirebase('documents').then(function() {
          if (!currentId && !isNew) renderList();
        });
      }
    });

    function populateDropdowns() {
      var projects = filterProjectsByAccess(getActiveItems('projects'));
      var opts = projects.map(function(p) {
        return '<option value="' + p.id + '">' + esc(p.name || 'Ohne Bezeichnung') + '</option>';
      }).join('');
      document.getElementById('fProject').innerHTML = '<option value="">Bitte waehlen</option>' + opts;
      document.getElementById('filterProject').innerHTML = '<option value="">Alle Projekte</option>' + opts;

      var typeOpts = DOC_TYPES.map(function(t) { return '<option value="' + t + '">' + t + '</option>'; }).join('');
      document.getElementById('filterDocType').innerHTML = '<option value="">Alle Typen</option>' + typeOpts;
    }

    // =============================================
    //  LIST VIEW
    // =============================================

    function showList() {
      document.getElementById('listView').style.display = '';
      document.getElementById('formView').style.display = 'none';
      currentId = null;
      isEditMode = false;
      history.replaceState(null, '', 'documents.html');
      renderList();
    }

    function renderList() {
      var docs = getActiveItems('documents').filter(function(d) { return canAccessProject(d.projectId); });
      var projFilter = document.getElementById('filterProject').value;
      var typeFilter = document.getElementById('filterDocType').value;

      var filtered = docs.filter(function(d) {
        if (projFilter && d.projectId !== projFilter) return false;
        if (typeFilter && d.docType !== typeFilter) return false;
        return true;
      });
      filtered.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });

      var container = document.getElementById('docList');
      if (filtered.length === 0) {
        container.innerHTML = '<p class="list-empty">Keine Dokumente gefunden</p>';
        return;
      }

      container.innerHTML = filtered.map(function(d) {
        var proj = d.projectId ? getItemById('projects', d.projectId) : null;
        var projName = proj ? proj.name : '';
        var isImage = (d.fileType || '').indexOf('image') !== -1 || /\.(jpg|jpeg|png|gif|webp|heic)$/i.test(d.fileName || '');
        var thumb = '<div class="doc-card-thumb">' + (isImage ? '&#128444;' : '&#128196;') + '</div>';
        var sizeStr = d.fileSize ? formatSize(d.fileSize) : '';

        return '<div class="card" style="display:flex;gap:12px;align-items:flex-start;">' +
          thumb +
          '<div style="min-width:0;flex:1;">' +
            '<div class="card-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(d.fileName || 'Dokument') + '</div>' +
            '<div class="card-subtitle">' + esc(d.docType || '') +
              (projName ? ' &middot; ' + esc(projName) : '') +
              (sizeStr ? ' &middot; ' + sizeStr : '') + '</div>' +
            (d.date ? '<div class="card-subtitle">' + formatDate(d.date) + '</div>' : '') +
            '<div class="doc-actions">' +
              '<button class="btn btn-secondary" onclick="viewDoc(\'' + d.id + '\')">Anzeigen</button>' +
              '<button class="btn btn-secondary" onclick="downloadDoc(\'' + d.id + '\')">Download</button>' +
              '<button class="btn btn-secondary" onclick="openForm(\'' + d.id + '\')">Bearbeiten</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    document.getElementById('filterProject').addEventListener('change', renderList);
    document.getElementById('filterDocType').addEventListener('change', renderList);
    document.getElementById('btnNew').addEventListener('click', function() { openForm(null); });

    // =============================================
    //  FORM VIEW
    // =============================================

    function openForm(id) {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('formView').style.display = '';
      clearWarnings();

      var urlProjectId = getUrlParam('projectId');

      if (id) {
        currentId = id;
        isEditMode = true;
        var d = getItemById('documents', id);
        if (!d) { showToast('Dokument nicht gefunden', 'error'); showList(); return; }
        if (!canAccessProject(d.projectId)) { showToast('Kein Zugriff auf dieses Dokument.', 'error'); showList(); return; }
        document.getElementById('formTitle').textContent = 'Dokument bearbeiten';
        history.replaceState(null, '', 'documents.html?id=' + id + (urlProjectId ? '&projectId=' + urlProjectId : ''));
        fillForm(d);
        document.getElementById('btnDelete').style.display = '';
        document.getElementById('btnAddPosition').style.display = 'none';
      } else {
        currentId = null;
        isEditMode = false;
        document.getElementById('formTitle').textContent = 'Dokumente hochladen';
        history.replaceState(null, '', 'documents.html?new=1' + (urlProjectId ? '&projectId=' + urlProjectId : ''));
        resetForm();
        document.getElementById('btnDelete').style.display = 'none';
        document.getElementById('btnAddPosition').style.display = '';
      }

      if (urlProjectId) {
        document.getElementById('fProject').value = urlProjectId;
        document.getElementById('projectDropdownGroup').style.display = 'none';
        var proj = getItemById('projects', urlProjectId);
        var nameEl = document.getElementById('projectNameDisplay');
        nameEl.textContent = 'Projekt: ' + (proj ? (proj.name || 'Ohne Bezeichnung') : urlProjectId);
        nameEl.style.display = '';
      } else {
        document.getElementById('projectDropdownGroup').style.display = '';
        document.getElementById('projectNameDisplay').style.display = 'none';
      }
      window.scrollTo(0, 0);
    }

    function fillForm(d) {
      document.getElementById('fProject').value = d.projectId || '';
      document.getElementById('fDate').value = d.date || '';
      var file = {};
      if (d.fileDataUrl) {
        file = { dataUrl: d.fileDataUrl, name: d.fileName, type: d.fileType, size: d.fileSize || 0 };
      } else if (d.downloadUrl) {
        file = { dataUrl: null, name: d.fileName, type: d.fileType, size: d.fileSize || 0, cloudUrl: d.downloadUrl };
      }
      positions = [{ docType: d.docType || '', description: d.description || '', files: file.name ? [file] : [] }];
      renderPositions();
    }

    function resetForm() {
      document.getElementById('docForm').reset();
      positions = [{ docType: '', description: '', files: [] }];
      renderPositions();
    }

    function clearWarnings() {
      document.querySelectorAll('.form-warning').forEach(function(w) { w.classList.remove('visible'); });
    }

    // =============================================
    //  DYNAMIC POSITIONS
    // =============================================

    function addPosition() {
      savePositionFields();
      positions.push({ docType: '', description: '', files: [] });
      renderPositions();
    }

    document.getElementById('btnAddPosition').addEventListener('click', addPosition);

    function removePosition(idx) {
      if (positions.length <= 1) return;
      savePositionFields();
      positions.splice(idx, 1);
      renderPositions();
    }

    function renderPositions() {
      var container = document.getElementById('positionsContainer');
      container.innerHTML = '';

      positions.forEach(function(pos, idx) {
        posCounter++;
        var uid = 'pos_' + posCounter;
        var canRemove = positions.length > 1 && !isEditMode;

        var card = document.createElement('div');
        card.className = 'position-card';
        card.innerHTML =
          (canRemove ? '<button type="button" class="pos-remove" data-idx="' + idx + '">&times;</button>' : '') +
          '<div style="font-weight:600;font-size:.85rem;margin-bottom:8px;">Position ' + (idx + 1) + '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Dokumenttyp <span class="required">*</span></label>' +
            '<select class="form-select pos-doctype" data-idx="' + idx + '">' + DOC_TYPE_OPTIONS + '</select>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Dateien hochladen <span class="required">*</span></label>' +
            '<div class="upload-buttons">' +
              '<button type="button" class="btn btn-secondary pos-btn-cam" data-idx="' + idx + '">&#128247; Foto</button>' +
              '<button type="button" class="btn btn-secondary pos-btn-file" data-idx="' + idx + '">&#128196; Datei</button>' +
              '<input type="file" class="pos-input-cam" data-idx="' + idx + '" accept="image/*" capture="environment">' +
              '<input type="file" class="pos-input-file" data-idx="' + idx + '" accept="*/*" multiple>' +
            '</div>' +
            '<div class="pos-file-list" data-idx="' + idx + '"></div>' +
          '</div>' +
          '<div class="form-group">' +
            '<label class="form-label">Beschreibung</label>' +
            '<input type="text" class="form-input pos-description" data-idx="' + idx + '" placeholder="Optional">' +
          '</div>';

        container.appendChild(card);

        // Set values
        card.querySelector('.pos-doctype').value = pos.docType || '';
        card.querySelector('.pos-description').value = pos.description || '';

        // Render file previews
        renderPosFiles(idx);

        // Events: remove
        var removeBtn = card.querySelector('.pos-remove');
        if (removeBtn) {
          removeBtn.addEventListener('click', function() {
            removePosition(parseInt(this.getAttribute('data-idx')));
          });
        }

        // Events: field changes
        card.querySelector('.pos-doctype').addEventListener('change', function() {
          positions[idx].docType = this.value;
        });
        card.querySelector('.pos-description').addEventListener('input', function() {
          positions[idx].description = this.value;
        });

        // Events: upload buttons
        var btnCam = card.querySelector('.pos-btn-cam');
        var btnFile = card.querySelector('.pos-btn-file');
        var inputCam = card.querySelector('.pos-input-cam');
        var inputFile = card.querySelector('.pos-input-file');

        btnCam.addEventListener('click', function() { inputCam.click(); });
        btnFile.addEventListener('click', function() { inputFile.click(); });

        inputCam.addEventListener('change', function(e) { handlePosUpload(e, idx); });
        inputFile.addEventListener('change', function(e) { handlePosUpload(e, idx); });
      });
    }

    function savePositionFields() {
      document.querySelectorAll('.pos-doctype').forEach(function(el) {
        var i = parseInt(el.getAttribute('data-idx'));
        if (positions[i]) positions[i].docType = el.value;
      });
      document.querySelectorAll('.pos-description').forEach(function(el) {
        var i = parseInt(el.getAttribute('data-idx'));
        if (positions[i]) positions[i].description = el.value;
      });
    }

    function handlePosUpload(e, posIdx) {
      var fileArr = Array.from(e.target.files);
      var remaining = fileArr.length;
      if (remaining === 0) return;

      fileArr.forEach(function(file) {
        var sizeMB = (file.size / (1024 * 1024)).toFixed(1);
        // Use extension fallback: file.type may be empty on Android/HEIC gallery
        var isImage = file.type.startsWith('image/') || /\.(jpe?g|png|gif|webp|heic|heif|bmp|avif)$/i.test(file.name);
        var maxSize = isImage ? 10 * 1024 * 1024 : 20 * 1024 * 1024;
        var maxLabel = isImage ? '10' : '20';
        console.log('[Docs] handlePosUpload:', file.name,
          '| type:', file.type || '(leer)',
          '| size:', (file.size/1024).toFixed(1)+'KB',
          '| isImage:', isImage);
        if (file.size > maxSize) {
          showToast(file.name + ' zu gross (' + sizeMB + ' MB). Maximum ist ' + maxLabel + ' MB.', 'error');
          if (--remaining === 0) { savePositionFields(); renderPositions(); }
          return;
        }
        if (isImage) {
          compressImage(file).then(function(blob) {
            var reader = new FileReader();
            reader.onload = function() {
              positions[posIdx].files.push({ dataUrl: reader.result, name: file.name, type: blob.type || file.type, size: blob.size, originalSize: blob._originalSize || file.size });
              if (!positions[posIdx].docType) positions[posIdx].docType = 'Foto';
              if (--remaining === 0) { savePositionFields(); renderPositions(); }
            };
            reader.readAsDataURL(blob);
          });
        } else {
          var reader = new FileReader();
          reader.onload = function() {
            positions[posIdx].files.push({ dataUrl: reader.result, name: file.name, type: file.type, size: file.size });
            if (--remaining === 0) { savePositionFields(); renderPositions(); }
          };
          reader.readAsDataURL(file);
        }
      });
      e.target.value = '';
    }

    function renderPosFiles(posIdx) {
      var container = document.querySelector('.pos-file-list[data-idx="' + posIdx + '"]');
      if (!container) return;
      var files = positions[posIdx].files || [];
      if (files.length === 0) { container.innerHTML = ''; return; }

      container.innerHTML = files.map(function(f, fIdx) {
        var isImg = (f.type || '').indexOf('image') !== -1 && f.dataUrl;
        var thumb = isImg
          ? '<div class="pos-file-thumb"><img src="' + f.dataUrl + '" alt=""></div>'
          : '<div class="pos-file-thumb" style="font-size:1.2rem;color:var(--color-text-secondary);">&#128196;</div>';
        var cloudTag = f.cloudUrl && !f.dataUrl ? ' (Cloud)' : '';
        return '<div class="pos-file-item">' + thumb +
          '<div class="pos-file-info">' +
            '<div class="pos-file-name">' + esc(f.name) + cloudTag + '</div>' +
            '<div class="pos-file-size">' + formatSize(f.size) + (f.originalSize && f.originalSize > f.size ? ' (komprimiert von ' + formatSize(f.originalSize) + ')' : '') + '</div>' +
          '</div>' +
          '<button type="button" class="pos-file-remove" data-pos="' + posIdx + '" data-file="' + fIdx + '">&times;</button>' +
        '</div>';
      }).join('');

      container.querySelectorAll('.pos-file-remove').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var pi = parseInt(btn.getAttribute('data-pos'));
          var fi = parseInt(btn.getAttribute('data-file'));
          positions[pi].files.splice(fi, 1);
          savePositionFields();
          renderPositions();
        });
      });
    }

    // =============================================
    //  FIREBASE STORAGE
    // =============================================

    var uploadCurrent = 0;
    var uploadTotal = 0;

    function showUploadProgress(percent, text) {
      var el = document.getElementById('uploadProgress');
      var fill = document.getElementById('uploadProgressFill');
      var txt = document.getElementById('uploadProgressText');
      el.classList.add('active');
      fill.style.width = Math.round(percent) + '%';
      txt.textContent = text || ('Wird hochgeladen... ' + Math.round(percent) + '%');
    }

    function hideUploadProgress() {
      document.getElementById('uploadProgress').classList.remove('active');
      document.getElementById('uploadProgressFill').style.width = '0%';
    }

    function uploadToStorage(projectId, docId, dataUrl, fileIndex, totalFiles) {
      if (!isOnline || !dataUrl) {
        console.log('[Docs] Skip upload: online=', isOnline, 'hasData=', !!dataUrl);
        return Promise.resolve(null);
      }
      try {
        var storagePath = 'files/' + projectId + '/' + docId;
        console.log('[Docs] Storage upload starting:', storagePath);
        var ref = storage.ref(storagePath);
        var parts = dataUrl.split(',');
        var mime = parts[0].match(/:(.*?);/)[1];
        var bstr = atob(parts[1]);
        var arr = new Uint8Array(bstr.length);
        for (var i = 0; i < bstr.length; i++) arr[i] = bstr.charCodeAt(i);
        var blob = new Blob([arr], { type: mime });
        var sizeMB = (blob.size / (1024 * 1024)).toFixed(1);
        console.log('[Docs] Uploading blob:', blob.size, 'bytes, type:', mime);

        var fileLabel = totalFiles > 1 ? 'Datei ' + fileIndex + '/' + totalFiles + ' — ' : '';
        var task = ref.put(blob);

        return new Promise(function(resolve) {
          task.on('state_changed',
            function(snapshot) {
              var filePercent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              var overallPercent = totalFiles > 1
                ? (((fileIndex - 1) / totalFiles) * 100) + (filePercent / totalFiles)
                : filePercent;
              showUploadProgress(overallPercent, fileLabel + Math.round(filePercent) + '% (' + sizeMB + ' MB)');
            },
            function(error) {
              console.error('[Docs] Storage upload error:', error);
              resolve(null);
            },
            function() {
              console.log('[Docs] Upload complete, getting downloadURL...');
              task.snapshot.ref.getDownloadURL().then(function(url) {
                console.log('[Docs] Got downloadURL:', url);
                resolve(url);
              }).catch(function() { resolve(null); });
            }
          );
        });
      } catch (e) {
        console.error('[Docs] Upload prep error:', e);
        return Promise.resolve(null);
      }
    }

    // =============================================
    //  SAVE
    // =============================================

    document.getElementById('docForm').addEventListener('submit', function(e) {
      e.preventDefault();
      savePositionFields();

      clearWarnings();
      var hasWarning = false;
      function warn(id, cond) {
        var el = document.getElementById(id);
        if (el) el.classList.toggle('visible', cond);
        if (cond) hasWarning = true;
      }

      var projectId = document.getElementById('fProject').value;
      warn('wProject', !projectId);

      var proj = projectId ? getItemById('projects', projectId) : null;
      var date = document.getElementById('fDate').value;

      var hasAnyFiles = positions.some(function(p) { return p.files.length > 0; });
      if (!hasAnyFiles) {
        showToast('Bitte mindestens eine Datei hochladen', 'error');
        return;
      }
      var missingType = positions.some(function(p) { return !p.docType; });
      if (missingType) hasWarning = true;

      // Require online for file uploads
      if (!isOnline) {
        showToast('Datei-Upload benoetigt Internetverbindung', 'error');
        return;
      }

      // Disable submit button during upload
      var submitBtn = document.querySelector('#docForm [type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Wird hochgeladen...';

      // Build list of records to save (with file references)
      var recordsToSave = [];

      if (isEditMode && currentId) {
        var pos = positions[0] || {};
        var f = (pos.files || [])[0] || {};
        recordsToSave.push({
          docId: currentId,
          data: {
            projectId: projectId,
            projectName: proj ? proj.name : '',
            docType: pos.docType || '',
            description: pos.description || '',
            date: date,
            fileName: f.name || '',
            fileType: f.type || '',
            fileSize: f.size || 0,
            fileDataUrl: '',
            downloadUrl: f.cloudUrl || ''
          },
          file: f,
          needsUpload: isOnline && f.dataUrl && projectId && !f.cloudUrl
        });
      } else {
        positions.forEach(function(pos) {
          if (pos.files.length === 0) return;
          pos.files.forEach(function(f) {
            recordsToSave.push({
              docId: generateId(),
              data: {
                projectId: projectId,
                projectName: proj ? proj.name : '',
                docType: pos.docType || '',
                description: pos.description || '',
                date: date,
                fileName: f.name || '',
                fileType: f.type || '',
                fileSize: f.size || 0,
                fileDataUrl: '',
                downloadUrl: ''
              },
              file: f,
              needsUpload: isOnline && f.dataUrl && projectId
            });
          });
        });
      }

      // Count uploads for progress
      var uploadsNeeded = recordsToSave.filter(function(r) { return r.needsUpload; });
      var totalUploads = uploadsNeeded.length;

      // Sequential upload chain for proper progress
      var uploadChain = Promise.resolve();
      var uploadIndex = 0;
      recordsToSave.forEach(function(rec) {
        if (!rec.needsUpload) return;
        uploadChain = uploadChain.then(function() {
          uploadIndex++;
          console.log('[Docs] Uploading file to Storage...', rec.data.fileName);
          return uploadToStorage(projectId, rec.docId, rec.file.dataUrl, uploadIndex, totalUploads).then(function(url) {
            if (url) {
              console.log('[Docs] Upload complete, downloadURL:', url);
              rec.data.downloadUrl = url;
            }
          });
        });
      });

      uploadChain.then(function() {
        hideUploadProgress();
        // Save all records
        var savedIds = [];
        recordsToSave.forEach(function(rec) {
          console.log('[Docs] Saving to DB:', { id: rec.docId, fileName: rec.data.fileName, downloadUrl: rec.data.downloadUrl, hasDataUrl: !!rec.data.fileDataUrl });
          try { saveToLocal('documents', rec.docId, rec.data); }
          catch (err) { rec.data.fileDataUrl = ''; saveToLocal('documents', rec.docId, rec.data); }
          savedIds.push(rec.docId);
        });

        var count = savedIds.length;
        showToast(count + ' Dokument' + (count > 1 ? 'e' : '') + ' gespeichert' +
          (hasWarning ? ' (fehlende Pflichtfelder)' : ''), hasWarning ? 'warning' : 'success');

        submitBtn.disabled = false;
        submitBtn.textContent = 'Speichern';

        if (isEditMode) return; // stay on edit page

        var urlProjId = getUrlParam('projectId');
        if (urlProjId) {
          window.location.href = 'projects.html?id=' + urlProjId;
        } else if (savedIds.length === 1) {
          currentId = savedIds[0];
          isEditMode = true;
          history.replaceState(null, '', 'documents.html?id=' + currentId);
          document.getElementById('formTitle').textContent = 'Dokument bearbeiten';
          document.getElementById('btnDelete').style.display = '';
          document.getElementById('btnAddPosition').style.display = 'none';
        } else {
          showList();
        }
      }).catch(function(err) {
        console.error('[Docs] Upload error:', err);
        hideUploadProgress();
        // Save records without URLs as fallback
        recordsToSave.forEach(function(rec) {
          try { saveToLocal('documents', rec.docId, rec.data); }
          catch (err2) { rec.data.fileDataUrl = ''; saveToLocal('documents', rec.docId, rec.data); }
        });
        showToast('Gespeichert (einige Uploads fehlgeschlagen)', 'warning');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Speichern';
        if (!isEditMode) showList();
      });
    });

    // =============================================
    //  DELETE / BACK
    // =============================================

    document.getElementById('btnDelete').addEventListener('click', function() {
      if (!currentId) return;
      var d = getItemById('documents', currentId);
      if (softDelete('documents', currentId, d ? (d.fileName || 'Dokument') : '')) {
        showToast('Dokument geloescht', 'success');
        var urlProjId = getUrlParam('projectId');
        if (urlProjId) {
          window.location.href = 'projects.html?id=' + urlProjId;
        } else {
          showList();
        }
      }
    });

    (function() {
      var projId = getUrlParam('projectId');
      var btn = document.getElementById('btnBack');
      if (projId) {
        btn.innerHTML = '&#8592; Zurueck zum Projekt';
      }
      btn.addEventListener('click', function() {
        if (projId) {
          window.location.href = 'projects.html?id=' + projId;
        } else {
          showList();
        }
      });
    })();

    // =============================================
    //  VIEW / DOWNLOAD / OFFLINE
    // =============================================

    function viewDoc(docId) {
      var d = getItemById('documents', docId);
      if (!d) { showToast('Dokument nicht gefunden', 'error'); return; }

      var url = d.downloadUrl;

      if (!url) {
        if (!isOnline) showToast('Offline — Datei nicht verfuegbar', 'error');
        else showToast('Keine Datei verfuegbar', 'error');
        return;
      }

      var isImage = (d.fileType || '').indexOf('image') !== -1 || /\.(jpg|jpeg|png|gif|webp|heic)$/i.test(d.fileName || '');
      var isPdf = (d.fileType || '').indexOf('pdf') !== -1 || /\.pdf$/i.test(d.fileName || '');

      if (isImage) {
        showImageOverlay(url);
      } else if (isPdf) {
        if (url.startsWith('http')) {
          var w = window.open(url, '_blank');
          if (!w) {
            var a = document.createElement('a');
            a.href = url; a.target = '_blank'; a.rel = 'noopener';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
          }
        } else if (url.startsWith('data:')) {
          var w = window.open('');
          if (w) {
            w.document.write('<html><head><title>PDF</title></head><body style="margin:0;">' +
              '<iframe src="' + url + '" style="width:100%;height:100%;border:none;"></iframe></body></html>');
            w.document.close();
          } else { window.location.href = url; }
        }
      } else {
        var w = window.open(url, '_blank');
        if (!w) { window.location.href = url; }
      }
    }

    function downloadDoc(docId) {
      var d = getItemById('documents', docId);
      if (!d) { showToast('Dokument nicht gefunden', 'error'); return; }

      var url = d.downloadUrl;
      if (!url) {
        showToast('Datei nicht verfuegbar' + (!isOnline ? ' (offline)' : ''), 'error');
        return;
      }

      var a = document.createElement('a');
      a.href = url; a.download = d.fileName || 'download';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    function showImageOverlay(src) {
      var overlay = document.createElement('div');
      overlay.className = 'doc-overlay';
      overlay.innerHTML = '<span style="position:absolute;top:16px;right:20px;color:#fff;font-size:36px;cursor:pointer;z-index:1001;line-height:1;">&times;</span>' +
        '<img src="' + src + '" alt="Dokument" crossorigin="anonymous">';
      overlay.addEventListener('click', function() {
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      });
      document.body.appendChild(overlay);
    }

    // =============================================
    //  HELPERS
    // =============================================

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
