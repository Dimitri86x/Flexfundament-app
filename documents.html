<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flexfundament App – Dokumente</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1565c0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    .upload-buttons{display:flex;gap:8px;flex-wrap:wrap}
    .upload-buttons .btn{font-size:.8rem;padding:8px 12px}
    .upload-buttons input[type="file"]{display:none}
    .doc-card-thumb{width:48px;height:48px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--color-border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f5f5f5;font-size:.6rem;text-align:center;color:var(--color-text-secondary)}
    .doc-card-thumb img{width:100%;height:100%;object-fit:cover}
    .file-list{margin-top:8px;display:flex;flex-direction:column;gap:8px}
    .file-item{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid var(--color-border);border-radius:var(--radius)}
    .file-item-thumb{width:48px;height:48px;border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f5f5f5}
    .file-item-thumb img{width:100%;height:100%;object-fit:cover}
    .file-item-pdf{font-size:1.5rem;color:var(--color-text-secondary)}
    .doc-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
    .doc-actions .btn{font-size:.7rem;padding:4px 8px;min-height:32px}
    .doc-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .doc-overlay img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
    .offline-saved{color:var(--color-success);font-size:.75rem;display:inline-flex;align-items:center;gap:2px}
    .file-item-info{flex:1;min-width:0}
    .file-item-name{font-size:.8rem;word-break:break-all}
    .file-item-size{font-size:.7rem;color:var(--color-text-secondary)}
    .file-item-remove{width:32px;height:32px;border:none;background:none;color:var(--color-error);font-size:1.2rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body>

  <!-- LIST VIEW -->
  <div id="listView" class="page">
    <div class="filter-bar">
      <select class="form-select" id="filterProject"><option value="">Alle Projekte</option></select>
      <select class="form-select" id="filterDocType"><option value="">Alle Typen</option></select>
    </div>
    <div id="docList"></div>
    <button class="fab" id="btnNew" title="Neues Dokument">+</button>
  </div>

  <!-- FORM VIEW -->
  <div id="formView" class="page" style="display:none;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <button class="btn-back" id="btnBack" type="button">&#8592; Zurueck</button>
      <h2 style="font-size:1.1rem;font-weight:600;" id="formTitle">Neues Dokument</h2>
    </div>

    <form id="docForm" novalidate>
      <div class="card">
        <div class="form-group">
          <label class="form-label">Projekt <span class="required">*</span></label>
          <select class="form-select" id="fProject" required><option value="">Bitte waehlen</option></select>
          <div class="form-warning" id="wProject">Bitte Projekt waehlen</div>
        </div>

        <div class="form-group">
          <label class="form-label">Dokumenttyp <span class="required">*</span></label>
          <select class="form-select" id="fDocType" required>
            <option value="">Bitte waehlen</option>
            <option>Belastungsversuch PDF</option>
            <option>Bodengutachten</option>
            <option>Lageplan</option>
            <option>Statik/Lastangaben</option>
            <option>Fundamentplan</option>
            <option>Bauplaene</option>
            <option>Richtpreisangebot</option>
            <option>Foto</option>
            <option>Sonstiges</option>
          </select>
          <div class="form-warning" id="wDocType">Bitte Dokumenttyp waehlen</div>
        </div>

        <div class="form-group">
          <label class="form-label">Dateien hochladen <span class="required">*</span></label>
          <div class="upload-buttons">
            <button type="button" class="btn btn-secondary" id="btnCamera">&#128247; Kamera</button>
            <button type="button" class="btn btn-secondary" id="btnGallery">&#128444; Galerie</button>
            <button type="button" class="btn btn-secondary" id="btnFile">&#128196; Datei</button>
            <button type="button" class="btn btn-secondary" id="btnDrive">&#9729; Drive</button>
            <input type="file" id="inputCamera" accept="image/*" capture="environment">
            <input type="file" id="inputGallery" accept="image/*" multiple>
            <input type="file" id="inputFile" accept="*/*" multiple>
          </div>
          <div class="file-list" id="fileList"></div>
          <div class="form-warning" id="wFile">Bitte mindestens eine Datei hochladen</div>
        </div>

        <div class="form-group">
          <label class="form-label">Beschreibung</label>
          <textarea class="form-textarea" id="fDescription" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Datum</label>
          <input type="date" class="form-input" id="fDate">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Speichern</button>
      <button type="button" class="btn btn-danger btn-block mt-sm" id="btnDelete" style="display:none;">Loeschen</button>
    </form>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>
    // --- State ---
    var currentId = null;
    var pendingFiles = []; // { dataUrl, name, type, size }
    var isEditMode = false; // true when editing existing single doc

    // --- Init ---
    initApp(function(user) {
      renderNav('documents');
      populateDropdowns();
      setupUploads();

      var editId = getUrlParam('id');
      var isNew = getUrlParam('new');
      if (editId) openForm(editId);
      else if (isNew) openForm(null);
      else showList();

      if (isOnline) {
        syncWithFirebase('documents').then(function() {
          if (!currentId && !isNew) renderList();
        });
      }
    });

    function populateDropdowns() {
      var projects = getActiveItems('projects');
      var opts = projects.map(function(p) {
        return '<option value="' + p.id + '">' + esc(p.name || 'Ohne Bezeichnung') + '</option>';
      }).join('');
      document.getElementById('fProject').innerHTML = '<option value="">Bitte waehlen</option>' + opts;
      document.getElementById('filterProject').innerHTML = '<option value="">Alle Projekte</option>' + opts;

      var types = ['Belastungsversuch PDF','Bodengutachten','Lageplan','Statik/Lastangaben',
        'Fundamentplan','Bauplaene','Richtpreisangebot','Foto','Sonstiges'];
      var typeOpts = types.map(function(t) { return '<option value="' + t + '">' + t + '</option>'; }).join('');
      document.getElementById('filterDocType').innerHTML = '<option value="">Alle Typen</option>' + typeOpts;
    }

    // =============================================
    //  LIST VIEW
    // =============================================

    function showList() {
      document.getElementById('listView').style.display = '';
      document.getElementById('formView').style.display = 'none';
      currentId = null;
      isEditMode = false;
      history.replaceState(null, '', 'documents.html');
      renderList();
    }

    function renderList() {
      var docs = getActiveItems('documents');
      var projFilter = document.getElementById('filterProject').value;
      var typeFilter = document.getElementById('filterDocType').value;

      var filtered = docs.filter(function(d) {
        if (projFilter && d.projectId !== projFilter) return false;
        if (typeFilter && d.docType !== typeFilter) return false;
        return true;
      });
      filtered.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });

      var container = document.getElementById('docList');
      if (filtered.length === 0) {
        container.innerHTML = '<p class="list-empty">Keine Dokumente gefunden</p>';
        return;
      }

      container.innerHTML = filtered.map(function(d) {
        var proj = d.projectId ? getItemById('projects', d.projectId) : null;
        var projName = proj ? proj.name : '';
        var isImage = d.fileType === 'image';
        var thumb = isImage && d.fileDataUrl
          ? '<div class="doc-card-thumb"><img src="' + d.fileDataUrl + '" alt=""></div>'
          : '<div class="doc-card-thumb">&#128196;<br>PDF</div>';
        var sizeStr = d.fileSize ? formatSize(d.fileSize) : '';
        var offlineKey = 'offline_doc_' + d.id;
        var isSavedOffline = !!localStorage.getItem(offlineKey);
        var offlineLabel = isSavedOffline
          ? '<span class="offline-saved">&#10003; Offline</span>'
          : '';

        return '<div class="card" style="display:flex;gap:12px;align-items:flex-start;">' +
          thumb +
          '<div style="min-width:0;flex:1;">' +
            '<div class="card-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(d.fileName || 'Dokument') + '</div>' +
            '<div class="card-subtitle">' + esc(d.docType || '') +
              (projName ? ' &middot; ' + esc(projName) : '') +
              (sizeStr ? ' &middot; ' + sizeStr : '') + '</div>' +
            (d.date ? '<div class="card-subtitle">' + formatDate(d.date) + '</div>' : '') +
            offlineLabel +
            '<div class="doc-actions">' +
              '<button class="btn btn-secondary" onclick="viewDoc(\'' + d.id + '\')">Anzeigen</button>' +
              '<button class="btn btn-secondary" onclick="downloadDoc(\'' + d.id + '\')">Download</button>' +
              '<button class="btn btn-secondary" onclick="toggleOffline(\'' + d.id + '\',this)" id="offBtn_' + d.id + '">' +
                (isSavedOffline ? '&#10003; Offline' : '&#128229; Offline speichern') + '</button>' +
              '<button class="btn btn-secondary" onclick="openForm(\'' + d.id + '\')">Bearbeiten</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    document.getElementById('filterProject').addEventListener('change', renderList);
    document.getElementById('filterDocType').addEventListener('change', renderList);
    document.getElementById('btnNew').addEventListener('click', function() { openForm(null); });

    // =============================================
    //  FORM VIEW
    // =============================================

    function openForm(id) {
      document.getElementById('listView').style.display = 'none';
      document.getElementById('formView').style.display = '';
      pendingFiles = [];
      clearWarnings();

      if (id) {
        currentId = id;
        isEditMode = true;
        var d = getItemById('documents', id);
        if (!d) { showToast('Dokument nicht gefunden', 'error'); showList(); return; }
        document.getElementById('formTitle').textContent = 'Dokument bearbeiten';
        history.replaceState(null, '', 'documents.html?id=' + id);
        fillForm(d);
        document.getElementById('btnDelete').style.display = '';
      } else {
        currentId = null;
        isEditMode = false;
        document.getElementById('formTitle').textContent = 'Dokumente hochladen';
        history.replaceState(null, '', 'documents.html?new=1');
        resetForm();
        document.getElementById('btnDelete').style.display = 'none';
      }
      window.scrollTo(0, 0);
    }

    function fillForm(d) {
      document.getElementById('fProject').value = d.projectId || '';
      document.getElementById('fDocType').value = d.docType || '';
      document.getElementById('fDescription').value = d.description || '';
      document.getElementById('fDate').value = d.date || '';
      if (d.fileDataUrl) {
        pendingFiles = [{ dataUrl: d.fileDataUrl, name: d.fileName, type: d.fileType, size: d.fileSize || 0 }];
      } else if (d.downloadUrl) {
        pendingFiles = [{ dataUrl: null, name: d.fileName, type: d.fileType, size: d.fileSize || 0, cloudUrl: d.downloadUrl }];
      }
      renderFileList();
    }

    function resetForm() {
      document.getElementById('docForm').reset();
      pendingFiles = [];
      renderFileList();
    }

    function clearWarnings() {
      document.querySelectorAll('.form-warning').forEach(function(w) { w.classList.remove('visible'); });
    }

    // =============================================
    //  FILE UPLOADS (multiple)
    // =============================================

    function setupUploads() {
      document.getElementById('btnCamera').addEventListener('click', function() { document.getElementById('inputCamera').click(); });
      document.getElementById('btnGallery').addEventListener('click', function() { document.getElementById('inputGallery').click(); });
      document.getElementById('btnFile').addEventListener('click', function() { document.getElementById('inputFile').click(); });
      document.getElementById('btnDrive').addEventListener('click', function() {
        showToast('Google Drive kommt in Phase 2', 'info');
      });

      ['inputCamera','inputGallery','inputFile'].forEach(function(inputId) {
        document.getElementById(inputId).addEventListener('change', function(e) {
          var files = Array.from(e.target.files);
          var remaining = files.length;
          if (remaining === 0) return;

          files.forEach(function(file) {
            if (file.size > 5 * 1024 * 1024) {
              showToast(file.name + ' ist zu gross (max. 5 MB)', 'error');
              if (--remaining === 0) renderFileList();
              return;
            }
            var isImage = file.type.startsWith('image/');
            if (isImage) {
              compressImage(file, 1920, 5).then(function(blob) {
                fileToDataUrl(blob, file.name, 'image', blob.size, function() {
                  if (--remaining === 0) renderFileList();
                });
              });
            } else {
              fileToDataUrl(file, file.name, 'file', file.size, function() {
                if (--remaining === 0) renderFileList();
              });
            }
          });
          e.target.value = '';
        });
      });
    }

    function fileToDataUrl(blob, name, type, size, done) {
      var reader = new FileReader();
      reader.onload = function() {
        pendingFiles.push({ dataUrl: reader.result, name: name, type: type, size: size });
        done();
      };
      reader.readAsDataURL(blob);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderFileList() {
      var container = document.getElementById('fileList');
      if (pendingFiles.length === 0) { container.innerHTML = ''; return; }

      container.innerHTML = pendingFiles.map(function(f, i) {
        var thumb;
        if (f.type === 'image' && f.dataUrl) {
          thumb = '<div class="file-item-thumb"><img src="' + f.dataUrl + '" alt=""></div>';
        } else {
          thumb = '<div class="file-item-thumb"><span class="file-item-pdf">&#128196;</span></div>';
        }
        var cloudTag = f.cloudUrl && !f.dataUrl ? ' (Cloud)' : '';
        return '<div class="file-item">' + thumb +
          '<div class="file-item-info">' +
            '<div class="file-item-name">' + esc(f.name) + cloudTag + '</div>' +
            '<div class="file-item-size">' + formatSize(f.size) + '</div>' +
          '</div>' +
          '<button type="button" class="file-item-remove" data-i="' + i + '">&times;</button>' +
        '</div>';
      }).join('');

      container.querySelectorAll('.file-item-remove').forEach(function(btn) {
        btn.addEventListener('click', function() {
          pendingFiles.splice(parseInt(btn.getAttribute('data-i')), 1);
          renderFileList();
        });
      });
    }

    // =============================================
    //  FIREBASE STORAGE
    // =============================================

    function uploadToStorage(projectId, docId, fileObj) {
      if (!isOnline || !fileObj || !fileObj.dataUrl) return Promise.resolve(null);
      try {
        var ref = storage.ref('files/' + projectId + '/' + docId);
        var parts = fileObj.dataUrl.split(',');
        var mime = parts[0].match(/:(.*?);/)[1];
        var bstr = atob(parts[1]);
        var arr = new Uint8Array(bstr.length);
        for (var i = 0; i < bstr.length; i++) arr[i] = bstr.charCodeAt(i);
        var blob = new Blob([arr], { type: mime });
        return ref.put(blob).then(function(snap) { return snap.ref.getDownloadURL(); })
          .catch(function(err) { console.error('[Docs] Upload error:', err); return null; });
      } catch (e) {
        console.error('[Docs] Upload prep error:', e);
        return Promise.resolve(null);
      }
    }

    // =============================================
    //  SAVE
    // =============================================

    document.getElementById('docForm').addEventListener('submit', function(e) {
      e.preventDefault();
      console.log('[Docs] Save triggered, files:', pendingFiles.length);

      try {
        clearWarnings();
        var hasWarning = false;
        function warn(id, cond) {
          var el = document.getElementById(id);
          if (el) el.classList.toggle('visible', cond);
          if (cond) hasWarning = true;
        }

        var projectId = document.getElementById('fProject').value;
        var docType = document.getElementById('fDocType').value;
        warn('wProject', !projectId);
        warn('wDocType', !docType);
        warn('wFile', pendingFiles.length === 0);

        var proj = projectId ? getItemById('projects', projectId) : null;
        var description = document.getElementById('fDescription').value.trim();
        var date = document.getElementById('fDate').value;

        if (isEditMode && currentId) {
          // Edit mode: save single doc
          var f = pendingFiles[0] || {};
          var data = {
            projectId: projectId,
            projectName: proj ? proj.name : '',
            docType: docType,
            description: description,
            date: date,
            fileName: f.name || '',
            fileType: f.type || '',
            fileSize: f.size || 0,
            fileDataUrl: f.dataUrl || '',
            downloadUrl: f.cloudUrl || ''
          };
          try { saveToLocal('documents', currentId, data); }
          catch (err) { data.fileDataUrl = ''; saveToLocal('documents', currentId, data); }

          showToast(hasWarning ? 'Gespeichert (fehlende Pflichtfelder)' : 'Dokument gespeichert', hasWarning ? 'warning' : 'success');

          // Upload to Storage
          if (isOnline && f.dataUrl && projectId && !f.cloudUrl) {
            uploadToStorage(projectId, currentId, f).then(function(url) {
              if (url) {
                var item = getItemById('documents', currentId);
                if (item) { item.downloadUrl = url; saveToLocal('documents', currentId, item); }
              }
            });
          }
        } else {
          // New mode: create one document per file
          if (pendingFiles.length === 0) {
            showToast('Bitte mindestens eine Datei hochladen', 'error');
            return;
          }

          var savedIds = [];
          pendingFiles.forEach(function(f) {
            var docId = generateId();
            var data = {
              projectId: projectId,
              projectName: proj ? proj.name : '',
              docType: docType,
              description: description,
              date: date,
              fileName: f.name || '',
              fileType: f.type || '',
              fileSize: f.size || 0,
              fileDataUrl: f.dataUrl || '',
              downloadUrl: ''
            };
            try { saveToLocal('documents', docId, data); }
            catch (err) { data.fileDataUrl = ''; saveToLocal('documents', docId, data); }
            savedIds.push(docId);

            // Upload to Storage
            if (isOnline && f.dataUrl && projectId) {
              uploadToStorage(projectId, docId, f).then(function(url) {
                if (url) {
                  var item = getItemById('documents', docId);
                  if (item) { item.downloadUrl = url; saveToLocal('documents', docId, item); }
                }
              });
            }
          });

          var count = savedIds.length;
          showToast(count + ' Dokument' + (count > 1 ? 'e' : '') + ' gespeichert' +
            (hasWarning ? ' (fehlende Pflichtfelder)' : ''), hasWarning ? 'warning' : 'success');

          // If single file, open it for editing
          if (savedIds.length === 1) {
            currentId = savedIds[0];
            isEditMode = true;
            history.replaceState(null, '', 'documents.html?id=' + currentId);
            document.getElementById('formTitle').textContent = 'Dokument bearbeiten';
            document.getElementById('btnDelete').style.display = '';
          } else {
            // Multiple files: go back to list
            showList();
            return;
          }
        }
      } catch (err) {
        console.error('[Docs] Save error:', err);
        showToast('Fehler: ' + err.message, 'error');
      }
    });

    // =============================================
    //  DELETE / BACK
    // =============================================

    document.getElementById('btnDelete').addEventListener('click', function() {
      if (!currentId) return;
      var d = getItemById('documents', currentId);
      if (softDelete('documents', currentId, d ? (d.fileName || 'Dokument') : '')) {
        showToast('Dokument geloescht', 'success');
        showList();
      }
    });

    document.getElementById('btnBack').addEventListener('click', function() { showList(); });

    // =============================================
    //  HELPERS
    // =============================================

    // =============================================
    //  VIEW / DOWNLOAD / OFFLINE
    // =============================================

    function viewDoc(docId) {
      var d = getItemById('documents', docId);
      if (!d) { showToast('Dokument nicht gefunden', 'error'); return; }

      // Try local data first, then offline cache, then cloud URL
      var dataUrl = d.fileDataUrl || localStorage.getItem('offline_doc_' + docId);
      var url = dataUrl || d.downloadUrl;

      if (!url) {
        if (!isOnline) showToast('Offline — Datei nicht lokal gespeichert', 'error');
        else showToast('Datei nicht verfuegbar', 'error');
        return;
      }

      if (d.fileType === 'image' && dataUrl) {
        showImageOverlay(dataUrl);
      } else {
        window.open(url, '_blank');
      }
    }

    function downloadDoc(docId) {
      var d = getItemById('documents', docId);
      if (!d) { showToast('Dokument nicht gefunden', 'error'); return; }

      var dataUrl = d.fileDataUrl || localStorage.getItem('offline_doc_' + docId);
      var url = dataUrl || d.downloadUrl;
      if (!url) {
        showToast('Datei nicht verfuegbar' + (!isOnline ? ' (offline)' : ''), 'error');
        return;
      }

      var a = document.createElement('a');
      a.href = url;
      a.download = d.fileName || 'download';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function toggleOffline(docId, btn) {
      var d = getItemById('documents', docId);
      if (!d) return;

      var offlineKey = 'offline_doc_' + docId;
      var existing = localStorage.getItem(offlineKey);

      if (existing) {
        // Remove offline cache
        localStorage.removeItem(offlineKey);
        btn.innerHTML = '&#128229; Offline speichern';
        showToast('Offline-Kopie entfernt', 'success');
        renderList();
        return;
      }

      // Save offline
      var dataUrl = d.fileDataUrl;
      if (!dataUrl && d.downloadUrl && isOnline) {
        // Fetch from cloud and convert to base64
        btn.textContent = 'Lade...';
        btn.disabled = true;
        fetch(d.downloadUrl).then(function(resp) { return resp.blob(); })
          .then(function(blob) {
            if (blob.size > 2 * 1024 * 1024) {
              showToast('Datei zu gross fuer Offline-Speicherung (max 2 MB)', 'error');
              btn.innerHTML = '&#128229; Offline speichern';
              btn.disabled = false;
              return;
            }
            var reader = new FileReader();
            reader.onload = function() {
              try {
                localStorage.setItem(offlineKey, reader.result);
                btn.innerHTML = '&#10003; Offline';
                showToast('Offline gespeichert', 'success');
                renderList();
              } catch (e) {
                showToast('Speicher voll — kann nicht offline speichern', 'error');
                btn.innerHTML = '&#128229; Offline speichern';
              }
              btn.disabled = false;
            };
            reader.readAsDataURL(blob);
          })
          .catch(function() {
            showToast('Download fehlgeschlagen', 'error');
            btn.innerHTML = '&#128229; Offline speichern';
            btn.disabled = false;
          });
        return;
      }

      if (!dataUrl) {
        showToast('Keine Datei zum Offline-Speichern vorhanden', 'error');
        return;
      }

      // Check size (~2 MB limit for base64 in localStorage)
      if (dataUrl.length > 2 * 1024 * 1024) {
        showToast('Datei zu gross fuer Offline-Speicherung (max 2 MB)', 'error');
        return;
      }

      try {
        localStorage.setItem(offlineKey, dataUrl);
        btn.innerHTML = '&#10003; Offline';
        showToast('Offline gespeichert', 'success');
        renderList();
      } catch (e) {
        showToast('Speicher voll — kann nicht offline speichern', 'error');
      }
    }

    function showImageOverlay(src) {
      var overlay = document.createElement('div');
      overlay.className = 'doc-overlay';
      overlay.innerHTML = '<img src="' + src + '" alt="Dokument">';
      overlay.addEventListener('click', function() { document.body.removeChild(overlay); });
      document.body.appendChild(overlay);
    }

    // =============================================
    //  HELPERS
    // =============================================

    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
