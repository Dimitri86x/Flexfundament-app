<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Admin – Flexfundament</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#515052">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    .admin-user-card { margin-bottom: var(--spacing-md); }
    .admin-user-header { display: flex; flex-direction: column; gap: 2px; margin-bottom: var(--spacing-sm); }
    .admin-user-name { font-weight: 600; font-size: .95rem; }
    .admin-user-email { font-size: .8rem; color: var(--color-text-secondary); }
    .admin-actions { display: flex; gap: var(--spacing-sm); flex-wrap: wrap; }
    .admin-actions .btn { font-size: .8rem; min-height: 36px; padding: 4px 12px; }
    .admin-project-list { margin-top: var(--spacing-sm); border-top: 1px solid var(--color-border); padding-top: var(--spacing-sm); }
    .admin-project-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--color-border); gap: var(--spacing-sm); }
    .admin-project-row:last-child { border-bottom: none; }
    .admin-project-name { font-size: .875rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-assign { font-size: .75rem; min-height: 30px; padding: 3px 10px; flex-shrink: 0; }
    .btn-deactivated { color: var(--color-error) !important; border-color: var(--color-error) !important; }
    .badge-pending { background: #f5a623; color: #fff; font-size: .7rem; padding: 2px 7px; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="page" id="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--spacing-md);">
      <div class="section-title" style="margin:0;">Benutzerverwaltung</div>
      <button class="btn btn-primary" style="font-size:.8rem;min-height:36px;padding:4px 12px;" onclick="toggleAddUserForm()">+ Benutzer anlegen</button>
    </div>

    <!-- Add-user form (hidden by default) -->
    <div id="addUserCard" class="card" style="display:none;margin-bottom:var(--spacing-md);">
      <div style="font-weight:600;font-size:.9rem;margin-bottom:var(--spacing-sm);">Neuen Benutzer anlegen</div>
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-input" id="newUserName" placeholder="Vor- und Nachname">
      </div>
      <div class="form-group">
        <label class="form-label">E-Mail <span class="required">*</span></label>
        <input type="email" class="form-input" id="newUserEmail" placeholder="name@beispiel.de">
        <div class="form-error" id="newUserEmailErr" style="display:none;">Bitte gültige E-Mail eingeben</div>
      </div>
      <div class="form-group">
        <label class="form-label">Rolle</label>
        <select class="form-select" id="newUserRole">
          <option value="worker">Mitarbeiter</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Projekte zuweisen</label>
        <div id="newUserProjectList" style="max-height:160px;overflow-y:auto;border:1px solid var(--color-border);border-radius:var(--radius);padding:4px 8px;"></div>
      </div>
      <div style="display:flex;gap:var(--spacing-sm);margin-top:var(--spacing-sm);">
        <button class="btn btn-primary" style="flex:1;" onclick="submitAddUser()">Anlegen</button>
        <button class="btn btn-secondary" style="flex:1;" onclick="toggleAddUserForm()">Abbrechen</button>
      </div>
    </div>

    <div id="userList">
      <div class="card"><p class="list-empty">Lade Benutzer…</p></div>
    </div>
    <div id="sectionActivity"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="shared.js"></script>
  <script>

    var allUsers        = {};   // uid → profile
    var allAssignments  = {};   // projectId → { assignedTo: {uid: true} }
    var allProjects     = [];   // getActiveItems('projects')
    var allPendingUsers = {};   // emailKey → pending profile
    var expandedUid     = null; // which user's project list is open

    initApp(function() {
      if (currentUserRole !== 'admin') {
        window.location.href = 'dashboard.html';
        return;
      }
      renderNav('admin');

      if (!isOnline) {
        document.getElementById('userList').innerHTML =
          '<div class="card"><p class="list-empty" style="padding:var(--spacing-lg);">' +
          'Benutzerverwaltung benötigt eine Online-Verbindung.</p></div>';
        return;
      }
      loadData();
    });

    // ---------------------------------------------------------------
    // Data loading
    // ---------------------------------------------------------------
    function loadData() {
      Promise.all([
        db.ref('users').once('value'),
        db.ref('projectAssignments').once('value'),
        db.ref('pendingUsers').once('value'),
        syncWithFirebase('projects'),
        syncWithFirebase('reports'),
        syncWithFirebase('costs'),
        syncWithFirebase('documents'),
        syncWithFirebase('drives')
      ]).then(function(results) {
        allUsers        = results[0].val() || {};
        allAssignments  = results[1].val() || {};
        allPendingUsers = results[2].val() || {};
        allProjects     = getActiveItems('projects');
        renderUsers();
        renderActivitySection();
      }).catch(function(err) {
        document.getElementById('userList').innerHTML =
          '<div class="card"><p class="list-empty" style="padding:var(--spacing-lg);">Fehler beim Laden: ' + esc(err.message) + '</p></div>';
      });
    }

    // ---------------------------------------------------------------
    // Render
    // ---------------------------------------------------------------
    function renderUsers() {
      var uids = Object.keys(allUsers);
      var myUid = firebase.auth().currentUser.uid;

      if (uids.length === 0) {
        document.getElementById('userList').innerHTML =
          '<div class="card"><p class="list-empty" style="padding:var(--spacing-lg);">Keine Benutzer gefunden.</p></div>';
        return;
      }

      // Sort: admins first, then by displayName
      uids.sort(function(a, b) {
        var ra = allUsers[a].role === 'admin' ? 0 : 1;
        var rb = allUsers[b].role === 'admin' ? 0 : 1;
        if (ra !== rb) return ra - rb;
        return (allUsers[a].displayName || '').localeCompare(allUsers[b].displayName || '');
      });

      var html = uids.map(function(uid) {
        var u       = allUsers[uid];
        var isAdmin = u.role === 'admin';
        var active  = u.active !== false;
        var isMe    = uid === myUid;

        var assignedCount = allProjects.filter(function(p) {
          return allAssignments[p.id] &&
                 allAssignments[p.id].assignedTo &&
                 allAssignments[p.id].assignedTo[uid];
        }).length;

        var projectsOpen = expandedUid === uid;

        return (
          '<div class="card admin-user-card" id="ucard-' + uid + '">' +
            '<div class="admin-user-header">' +
              '<span class="admin-user-name">' + esc(u.displayName || '–') +
                (isMe ? ' <span style="font-size:.75rem;color:var(--color-text-secondary);">(ich)</span>' : '') +
              '</span>' +
              '<span class="admin-user-email">' + esc(u.email || '') + '</span>' +
            '</div>' +

            '<div class="admin-actions">' +
              '<button onclick="toggleRole(\'' + uid + '\')" class="btn btn-secondary">' +
                'Rolle: <strong>' + (isAdmin ? 'Admin' : 'Mitarbeiter') + '</strong>' +
              '</button>' +
              '<button onclick="toggleActive(\'' + uid + '\')" class="btn btn-secondary' + (!active ? ' btn-deactivated' : '') + '">' +
                (active ? '✓ Aktiv' : '✗ Gesperrt') +
              '</button>' +
            '</div>' +

            '<button onclick="toggleProjectPanel(\'' + uid + '\')" ' +
              'class="btn btn-secondary" ' +
              'style="width:100%;margin-top:var(--spacing-sm);text-align:left;justify-content:space-between;">' +
              '<span>Projekte (' + assignedCount + ' zugewiesen)</span>' +
              '<span>' + (projectsOpen ? '▴' : '▾') + '</span>' +
            '</button>' +

            (projectsOpen
              ? '<div class="admin-project-list">' + renderProjectList(uid) + '</div>'
              : '') +
          '</div>'
        );
      }).join('');

      // Pending users (pre-provisioned, not yet logged in)
      var pendingKeys = Object.keys(allPendingUsers);
      if (pendingKeys.length > 0) {
        html += pendingKeys.map(function(key) {
          var p = allPendingUsers[key];
          return (
            '<div class="card admin-user-card" style="opacity:.8;">' +
              '<div class="admin-user-header">' +
                '<span class="admin-user-name">' + esc(p.displayName || '–') +
                  ' <span class="badge-pending">Ausstehend</span>' +
                '</span>' +
                '<span class="admin-user-email">' + esc(p.email || '') + '</span>' +
              '</div>' +
              '<div style="display:flex;align-items:center;justify-content:space-between;font-size:.8rem;color:var(--color-text-secondary);">' +
                '<span>Rolle: ' + esc(p.role || 'worker') + '</span>' +
                '<button onclick="deletePendingUser(\'' + key + '\')" ' +
                  'class="btn btn-secondary" style="font-size:.75rem;min-height:30px;padding:3px 10px;color:var(--color-error);border-color:var(--color-error);">' +
                  'Löschen' +
                '</button>' +
              '</div>' +
              (function() {
                var pids = Object.keys(p.assignedProjectIds || {});
                if (pids.length === 0) return '';
                var names = pids.map(function(pid) {
                  var proj = allProjects.find(function(pr) { return pr.id === pid; });
                  return proj ? esc(proj.name) : esc(pid);
                }).join(', ');
                return '<div style="font-size:.75rem;color:var(--color-text-secondary);margin-top:4px;">Projekte: ' + names + '</div>';
              })() +
            '</div>'
          );
        }).join('');
      }

      document.getElementById('userList').innerHTML = html;
    }

    function renderProjectList(uid) {
      if (allProjects.length === 0) {
        return '<p class="list-empty" style="padding:var(--spacing-sm) 0;font-size:.85rem;">Keine Projekte vorhanden.</p>';
      }
      return allProjects.map(function(p) {
        var assigned = !!(
          allAssignments[p.id] &&
          allAssignments[p.id].assignedTo &&
          allAssignments[p.id].assignedTo[uid]
        );
        return (
          '<div class="admin-project-row">' +
            '<span class="admin-project-name">' + esc(p.name || 'Projekt') + '</span>' +
            '<button onclick="toggleAssignment(\'' + p.id + '\',\'' + uid + '\',' + assigned + ')" ' +
              'class="btn btn-assign ' + (assigned ? 'btn-primary' : 'btn-secondary') + '">' +
              (assigned ? 'Zugewiesen ✓' : 'Zuweisen') +
            '</button>' +
          '</div>'
        );
      }).join('');
    }

    // ---------------------------------------------------------------
    // Actions
    // ---------------------------------------------------------------
    function toggleProjectPanel(uid) {
      expandedUid = expandedUid === uid ? null : uid;
      renderUsers();
    }

    function toggleRole(uid) {
      var u = allUsers[uid];
      if (!u) return;
      var myUid   = firebase.auth().currentUser.uid;
      var newRole = u.role === 'admin' ? 'worker' : 'admin';

      if (uid === myUid && newRole === 'worker') {
        showToast('Du kannst dich nicht selbst zum Mitarbeiter herabstufen.', 'error');
        return;
      }
      db.ref('users/' + uid).update({ role: newRole }).then(function() {
        allUsers[uid].role = newRole;
        // Keep local cache in sync so the changed user sees their new role on next load
        try {
          var k = 'ff_userprofile_' + uid;
          var c = JSON.parse(localStorage.getItem(k) || '{}');
          c.role = newRole;
          localStorage.setItem(k, JSON.stringify(c));
        } catch(e) {}
        renderUsers();
        showToast('Rolle gespeichert.', 'success');
      }).catch(function(err) {
        showToast('Fehler: ' + err.message, 'error');
      });
    }

    function toggleActive(uid) {
      var u     = allUsers[uid];
      var myUid = firebase.auth().currentUser.uid;
      if (!u || uid === myUid) {
        showToast('Du kannst dich nicht selbst sperren.', 'error');
        return;
      }
      var newActive = u.active === false;   // toggle: false→true, true/undefined→false
      db.ref('users/' + uid).update({ active: newActive }).then(function() {
        allUsers[uid].active = newActive;
        renderUsers();
        showToast(newActive ? 'Benutzer aktiviert.' : 'Benutzer gesperrt.', newActive ? 'success' : 'warning');
      }).catch(function(err) {
        showToast('Fehler: ' + err.message, 'error');
      });
    }

    function toggleAssignment(projectId, uid, currentlyAssigned) {
      var adminUid = firebase.auth().currentUser.uid;

      if (currentlyAssigned) {
        db.ref('projectAssignments/' + projectId + '/assignedTo/' + uid).remove().then(function() {
          if (allAssignments[projectId] && allAssignments[projectId].assignedTo) {
            delete allAssignments[projectId].assignedTo[uid];
          }
          renderUsers();
          showToast('Zuweisung entfernt.', 'success');
        }).catch(function(err) {
          showToast('Fehler: ' + err.message, 'error');
        });
      } else {
        var updates = {};
        updates['projectAssignments/' + projectId + '/assignedTo/' + uid] = true;
        updates['projectAssignments/' + projectId + '/assignedAt']         = Date.now();
        updates['projectAssignments/' + projectId + '/assignedBy']         = adminUid;
        db.ref().update(updates).then(function() {
          if (!allAssignments[projectId]) allAssignments[projectId] = {};
          if (!allAssignments[projectId].assignedTo) allAssignments[projectId].assignedTo = {};
          allAssignments[projectId].assignedTo[uid] = true;
          renderUsers();
          showToast('Projekt zugewiesen.', 'success');
        }).catch(function(err) {
          showToast('Fehler: ' + err.message, 'error');
        });
      }
    }

    // ---------------------------------------------------------------
    // Add user form
    // ---------------------------------------------------------------
    function toggleAddUserForm() {
      var card = document.getElementById('addUserCard');
      var visible = card.style.display !== 'none';
      card.style.display = visible ? 'none' : '';
      if (!visible) {
        document.getElementById('newUserName').value  = '';
        document.getElementById('newUserEmail').value = '';
        document.getElementById('newUserRole').value  = 'worker';
        document.getElementById('newUserEmailErr').style.display = 'none';
        // Render project checkboxes
        var listEl = document.getElementById('newUserProjectList');
        if (allProjects.length === 0) {
          listEl.innerHTML = '<p style="font-size:.8rem;color:var(--color-text-secondary);padding:4px 0;">Keine Projekte vorhanden</p>';
        } else {
          listEl.innerHTML = allProjects.map(function(p) {
            return '<label style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.85rem;cursor:pointer;">' +
              '<input type="checkbox" id="proj_new_' + esc(p.id) + '" value="' + esc(p.id) + '">' +
              esc(p.name || 'Projekt') +
            '</label>';
          }).join('');
        }
      }
    }

    function submitAddUser() {
      var name  = document.getElementById('newUserName').value.trim();
      var email = document.getElementById('newUserEmail').value.trim().toLowerCase();
      var role  = document.getElementById('newUserRole').value;
      var errEl = document.getElementById('newUserEmailErr');

      errEl.style.display = 'none';
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errEl.style.display = '';
        return;
      }

      // Check for duplicate (already registered or already pending)
      var emailExists = Object.keys(allUsers).some(function(uid) {
        return (allUsers[uid].email || '').toLowerCase() === email;
      });
      if (emailExists) {
        showToast('Ein Benutzer mit dieser E-Mail existiert bereits.', 'error');
        return;
      }

      var emailKey  = email.replace(/[^a-z0-9]/g, '_');
      var adminUser = firebase.auth().currentUser;
      var now       = Date.now();

      // Collect selected project IDs
      var assignedProjectIds = {};
      allProjects.forEach(function(p) {
        var cb = document.getElementById('proj_new_' + p.id);
        if (cb && cb.checked) assignedProjectIds[p.id] = true;
      });

      var record = {
        email:              email,
        displayName:        name || '',
        role:               role,
        active:             true,
        assignedProjectIds: assignedProjectIds,
        createdAt:          now,
        createdByUid:       adminUser.uid,
        createdByEmail:     adminUser.email        || '',
        createdByName:      adminUser.displayName  || ''
      };

      db.ref('pendingUsers/' + emailKey).set(record).then(function() {
        allPendingUsers[emailKey] = record;
        toggleAddUserForm();
        renderUsers();
        showToast('Benutzer angelegt. Wird beim ersten Login aktiviert.', 'success');
      }).catch(function(err) {
        showToast('Fehler: ' + err.message, 'error');
      });
    }

    function deletePendingUser(emailKey) {
      db.ref('pendingUsers/' + emailKey).remove().then(function() {
        delete allPendingUsers[emailKey];
        renderUsers();
        showToast('Ausstehender Benutzer gelöscht.', 'success');
      }).catch(function(err) {
        showToast('Fehler: ' + err.message, 'error');
      });
    }

    function esc(str) {
      var d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // ---------------------------------------------------------------
    // Activity section — aggregates updatedAt/By from all collections
    // ---------------------------------------------------------------
    function renderActivitySection() {
      var cols = [
        { key: 'projects',  label: 'Projekt',   nameField: 'name' },
        { key: 'reports',   label: 'Bericht',   nameField: 'projectName' },
        { key: 'costs',     label: 'Kosten',    nameField: 'category' },
        { key: 'documents', label: 'Dokument',  nameField: 'name' },
        { key: 'drives',    label: 'Fahrt',     nameField: 'projectName' }
      ];

      var entries = [];
      cols.forEach(function(col) {
        getActiveItems(col.key).forEach(function(item) {
          if (!item.updatedAt) return;
          entries.push({
            ts:     item.updatedAt,
            by:     item.updatedByName || item.updatedByEmail || item.updatedByUid || '–',
            module: col.label,
            name:   item[col.nameField] || '–'
          });
        });
      });

      if (entries.length === 0) {
        document.getElementById('sectionActivity').innerHTML = '';
        return;
      }

      entries.sort(function(a, b) { return b.ts - a.ts; });
      entries = entries.slice(0, 15);

      var rows = entries.map(function(e) {
        var d       = new Date(e.ts);
        var dateStr = d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        var timeStr = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        return (
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
                'padding:9px 0;border-bottom:1px solid var(--color-border);gap:8px;">' +
            '<div style="min-width:0;flex:1;">' +
              '<span style="font-size:.85rem;font-weight:500;">' + esc(e.by) + '</span>' +
              '<span style="font-size:.8rem;color:var(--color-text-secondary);display:block;' +
                    'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
                esc(e.module) + ' · ' + esc(e.name) +
              '</span>' +
            '</div>' +
            '<span style="font-size:.75rem;color:var(--color-text-secondary);white-space:nowrap;flex-shrink:0;">' +
              dateStr + '<br>' + timeStr +
            '</span>' +
          '</div>'
        );
      }).join('');

      document.getElementById('sectionActivity').innerHTML =
        '<div class="section-title" style="margin-top:var(--spacing-lg);">Letzte Änderungen</div>' +
        '<div class="card">' + rows + '</div>';
    }

  </script>
</body>
</html>
